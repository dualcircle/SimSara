            if(o.y<fp.y1*CELL+4)o.vy=Math.abs(o.vy);if(o.y>(fp.y2+1)*CELL-4)o.vy=-Math.abs(o.vy);
            break;
          }
        }
      }
      o.mood=onPlot?'harvest':'returning';
    }
    else if(o.dna.cl===CL.M){
      var sh=nearestSH(o.x,o.y);
      if(sh>=0){
        var s=storehouses[sh];var di=dist2(o.x,o.y,s.x,s.y);
        if(o.carrying<25&&s.food>5){
          o.mood='stock';
          var ddx=s.x-o.x,ddy=s.y-o.y,di2=Math.sqrt(ddx*ddx+ddy*ddy)||1;
          o.vx=o.vx*0.82+(ddx/di2)*o.dna.spd*0.18;o.vy=o.vy*0.82+(ddy/di2)*o.dna.spd*0.18;
          if(di<DEPOSIT_RANGE&&s.food>0){var take=Math.min(s.food,30);s.food-=take;o.carrying+=take;o.energy=Math.min(o.energy+take*0.3,128);o.ticksSinceAte=0;}
        }else if(o.carrying>SACRIFICE_MIN*2){
          // Merchants seek the nearest priest and hand over surplus
          var nearPM=sgPriest.q(o.x,o.y,60);
          var foundPM=false;
          for(var j=0;j<nearPM.length;j++){
            var r=nearPM[j];if(!r.alive||r.sramana)continue;
            var pdx=r.x-o.x,pdy=r.y-o.y,pdi=Math.sqrt(pdx*pdx+pdy*pdy)||1;
            o.mood='offering';
            if(pdi>18){
              o.vx=o.vx*0.78+(pdx/pdi)*o.dna.spd*0.22;
              o.vy=o.vy*0.78+(pdy/pdi)*o.dna.spd*0.22;
            }else{
              var mgive=Math.min(o.carrying-DAILY_RATION,CARRY_MAX-r.carrying);
              o.carrying-=mgive;r.carrying=Math.min((r.carrying||0)+mgive,CARRY_MAX);
              r.energy=Math.min(r.energy+mgive*1.5,128);r.ticksSinceAte=0;
            }
            foundPM=true;break;
          }
          if(!foundPM){o.vx=o.vx*0.88+(Math.random()-0.5)*o.dna.spd*0.15;o.vy=o.vy*0.88+(Math.random()-0.5)*o.dna.spd*0.15;}
        }else if(o.carrying>0){
          o.mood='distribute';
          var nearby=sgB.q(o.x,o.y,DISTRIBUTE_RANGE);
          for(var j=0;j<nearby.length;j++){var r=nearby[j];if(!r.alive||r.isPlant||r.dna.cl===CL.F||r.dna.cl===CL.M)continue;if(r.energy<70&&o.carrying>0){var give=Math.min(o.carrying,8,128-r.energy/1.5);r.energy=Math.min(r.energy+give*1.2,128);r.ticksSinceAte=0;o.carrying-=give;if(o.carrying<=0)break;}}
          if(o.homeX>0){var ddx=o.homeX-o.x,ddy=o.homeY-o.y,di2=Math.sqrt(ddx*ddx+ddy*ddy)||1;o.vx+=ddx/di2*HOME_PULL*0.15;o.vy+=ddy/di2*HOME_PULL*0.15;}
          else{o.vx=o.vx*0.88+(Math.random()-0.5)*o.dna.spd*0.15;o.vy=o.vy*0.88+(Math.random()-0.5)*o.dna.spd*0.15;}
        }else{o.vx=o.vx*0.88+(Math.random()-0.5)*o.dna.spd*0.2;o.vy=o.vy*0.88+(Math.random()-0.5)*o.dna.spd*0.2;}
      }
      // Warriors: collect tithe then make altar offerings with surplus
    }else if(o.dna.cl===CL.W&&o.carrying>SACRIFICE_MIN+2){
      // Warriors bring surplus to the nearest priest
      var nearPW=sgPriest.q(o.x,o.y,55);
      for(var j=0;j<nearPW.length;j++){
        var r=nearPW[j];if(!r.alive||r.sramana)continue;
        var pdx=r.x-o.x,pdy=r.y-o.y,pdi=Math.sqrt(pdx*pdx+pdy*pdy)||1;
        if(pdi>18&&Math.random()<0.012){
          o.vx=o.vx*0.82+(pdx/pdi)*o.dna.spd*0.18;
          o.vy=o.vy*0.82+(pdy/pdi)*o.dna.spd*0.18;
        }else if(pdi<=18){
          var wgive=Math.min(o.carrying-2,CARRY_MAX-r.carrying);
          o.carrying-=wgive;r.carrying=Math.min((r.carrying||0)+wgive,CARRY_MAX);
          r.energy=Math.min(r.energy+wgive*1.5,128);r.ticksSinceAte=0;
        }
        break;
      }
    }
    else if(o.dna.cl===CL.P||isBrahma(o)){
      // Priest senses suffering, prays, ministers
      var nearbySuf=0,nearbyCount=0;
      var around=sgB.q(o.x,o.y,PRIEST_SENSE_R);
      for(var j=0;j<around.length;j++){

        if(wcx2>=0&&wcx2<COLS&&wcy2>=0&&wcy2<ROWS&&!walls[wcy2*COLS+wcx2])ny2=o.y;
        else{var wcx3=Math.floor(o.x/CELL),wcy3=Math.floor((o.y+o.vy)/CELL);if(wcx3>=0&&wcx3<COLS&&wcy3>=0&&wcy3<ROWS&&!walls[wcy3*COLS+wcx3])nx2=o.x;else{nx2=o.x;ny2=o.y;}}
      }
    }
    o.x=clamp(nx2,3,W-3);o.y=clamp(ny2,3,H-3);
    if(o.x<=3||o.x>=W-3)o.vx*=-0.5;if(o.y<=3||o.y>=H-3)o.vy*=-0.5;

    o.energy-=o.dna.met+Math.abs(o.vx+o.vy)*0.007;
    var hg=clamp(o.ticksSinceAte/55,0,1);


    // WATER OF LIFE — single pool deep in NE animal territory
    if(!isAnimal(o)&&!o.isPlant){
      var lpd=dist2(o.x,o.y,LIFE_POOL.x,LIFE_POOL.y);
      if(lpd<LIFE_POOL.r*LIFE_POOL.r&&LIFE_POOL.level>0.1){
        if(!o.lifeDrank){
          o.lifeDrank=true;
          o.lifeTimer=LIFE_POOL_TICKS;
          o.invincibleTimer=INVINCIBLE_TICKS;
          LIFE_POOL.level=Math.max(0,LIFE_POOL.level-0.25);
          // 1 in 10 drinks triggers the bloom
          if(Math.random()<0.05){
            BLOOM_TICKS=40;
            for(var bi=0;bi<NCELLS;bi++){
              if(!walls[bi]){wildNutrient[bi]=1.0;plotNutrient[bi]=1.0;plotStrength[bi]=1.0;}
            }
            showBanner((o.dna.name||'a wanderer')+' drinks deep — the land blooms','#40c0ff');logEvent('bloom',{drinker:o.dna.name,cl:o.dna.cl});
          }else{
            showBanner((o.dna.name||'a wanderer')+' drinks from the Water of Life','#40c0ff');logEvent('water_of_life',{drinker:o.dna.name,cl:o.dna.cl});
          }
        }
      }
    }
    // Life pool timer ticks down
    if(o.lifeTimer>0){
      o.lifeTimer--;
      o.dna.met=Math.max(o.dna.met*0.998,0.001); // metabolism nearly stops
      if(o.lifeTimer===0){o.lifeDrank=false;} // effect wears off, can drink again
    }
    if(o.invincibleTimer>0)o.invincibleTimer--;
    // Life pool slow regen
    if(tick%500===0)LIFE_POOL.level=Math.min(1.0,LIFE_POOL.level+0.20);

    // THIRST — seek nearest pond, NW gives full reset, others partial
    o.thirst=(o.thirst||0)+1;
    var drank=false;
    for(var pi=0;pi<PONDS.length;pi++){
      var pd=PONDS[pi];
      if(dist2(o.x,o.y,pd.x,pd.y)<pd.r){
        var available=Math.min(pd.level,pd.purity);
        if(available>0.005){
          var drink=Math.min(available*0.40,0.30); // substantial drain per drink
          pd.level=Math.max(0,pd.level-drink);
          o.thirst=Math.max(0,o.thirst-WATER_THIRST_MAX*available);
          o.energy=Math.min(o.energy+0.4*available,128);
          drank=true;
        }
        break;
      }
    }
    // Canals also provide partial water
    if(!drank){
      for(var ci2=0;ci2<CANALS.length;ci2++){
        var cn=CANALS[ci2];
        for(var cpi=0;cpi<cn.pts.length;cpi+=4){
          var cp=cn.pts[cpi];
          if(dist2(o.x,o.y,cp.x,cp.y)<cn.width*CELL){
            o.thirst=Math.max(0,o.thirst-WATER_THIRST_MAX*cn.purity*0.7);
            o.energy=Math.min(o.energy+0.5*cn.purity,128);
            drank=true;break;
          }
        }
        if(drank)break;
      }
    }
    if(!drank&&o.thirst>WATER_THIRST_CRIT){
      // Seek best pond — scored by current level × purity, penalise depleted ones
      var nearPond=null,nearPondScore=-1;
      for(var pi=0;pi<PONDS.length;pi++){
        var pd=PONDS[pi];
        var d=Math.sqrt(dist2(o.x,o.y,pd.x,pd.y));
        if(pd.level<0.05)continue; // dry — skip
        // Distance dominates — nearby adequate water beats distant pure water
        var adequacy=pd.level*pd.purity;
        if(adequacy<0.08)continue; // too depleted to bother
        var score=adequacy*30-(d*0.35); // distance 3x more important than before
        if(score>nearPondScore){nearPondScore=score;nearPond=pd;}
      }
      if(nearPond){
        var wdx=nearPond.x-o.x,wdy=nearPond.y-o.y,wdi=Math.sqrt(wdx*wdx+wdy*wdy)||1;
        var urgency=clamp((o.thirst-WATER_THIRST_CRIT)/(WATER_THIRST_MAX-WATER_THIRST_CRIT),0,1);
        // Drift toward water, don't sprint — competes with other behaviors
        o.vx+=wdx/wdi*urgency*0.20;o.vy+=wdy/wdi*urgency*0.20;
      }
    }
    var thirstRatio=clamp(o.thirst/WATER_THIRST_MAX,0,1);
    if(thirstRatio>0.7)o.energy-=thirstRatio*0.08;

    o.suffering=clamp(hg*(0.3+o.dna.moh*0.7)+thirstRatio*0.3,0,1);
    o.sufferPulse=o.suffering>0.45?o.suffering:Math.max(0,o.sufferPulse-0.05);

    if(o.energy<=0){if(bardo.length<MAX_BARDO)bardo.push(makeSoul(o.dna,o.x,o.y,false,false));flashes.push({x:o.x,y:o.y,age:0,max:20,type:'death'});o.alive=false;continue;}
    o.energy=Math.min(128,o.energy);

    // Reproduction — with fertility zone boost
    var inFertZone=dist2(o.x,o.y,FERT_X,FERT_Y)<FERT_R||dist2(o.x,o.y,FERT_X2,FERT_Y2)<FERT_R2;
    var isDemi2=isDemigod(o)||isDemiNaga(o)||isBrahma(o);
    var traceStr=isDemi2?clamp((Math.abs(o.dna.trace||0)-DEMI_THRESH)/(1-DEMI_THRESH),0,1):0;
    var demiBoost=isDemi2?(1.5+traceStr*2.0):1.0;  // 1.5x at threshold, up to 3.5x at full trace
    var fertBoost=inFertZone?FERT_BOOST:1.0;
    // Ratio cap — if a caste is over its target share, reproduction penalised hard
    // Target: 80% farmers, 8% warriors, 7% merchants, 5% priests
    var casteRatio=1.0;
    // Bandits can only reproduce if they've raided recently — must have killed to breed
    if(isBandit(o)){casteRatio=(o.ticksSinceAte<60||o.energy>50)?1.2:0.0;}
    else if(!isDemi2&&cTotal>10){
      var share=0;
      if(o.dna.cl===CL.P)share=priestCount/cTotal;
      else if(o.dna.cl===CL.W)share=warriorCount/cTotal;
      else if(o.dna.cl===CL.M)share=merchantCount/cTotal;
      var target=o.dna.cl===CL.P?0.05:o.dna.cl===CL.W?0.20:o.dna.cl===CL.M?0.10:1.0;
      if(share>target*2.0)casteRatio=0.30;
      else if(share>target)casteRatio=clamp(1-(share-target)/(target),0.30,1.0);
    }
    var myRepCh=repCh*(o.dna.cl===CL.F?farmerBoost:o.dna.cl===CL.W?warriorBoost:1.0)*demiBoost*fertBoost*casteRatio;
    // Bandits: lower threshold, shorter cooldown, wider range at den
    var atDen=isBandit(o)&&dist2(o.x,o.y,BANDIT_DEN_X,BANDIT_DEN_Y)<900; // ~30px radius
    var repThresh=isDemi2?o.dna.rth*(0.55-traceStr*0.15):
                  isBandit(o)?(atDen?o.dna.rth*0.45:o.dna.rth*0.50):
                  inFertZone?o.dna.rth*0.70:o.dna.rth;
    var repCool=isDemi2?Math.floor(35-traceStr*20):isBandit(o)?40:80;
    // Bandits search wide — they mate opportunistically wherever they are
    var repRange=isDemi2?Math.floor(40+traceStr*30):isBandit(o)?45:22;
    if(o.energy>repThresh&&o.mateCooldown===0&&cTotal<MAX_BEINGS&&Math.random()<myRepCh){
      var isMale=o.dna.sex==='M';
      if(isMale&&!o.pregnant&&!o.isInfant){
      var nearby=sgB.q(o.x,o.y,repRange);var mate=null;
      // Male approaches females — female evaluates and may reject
      var candidates=[];
      for(var j=0;j<nearby.length;j++){
        var r=nearby[j];
        if(r===o||!r.alive||r.mateCooldown>0||r.isPlant||r.isInfant||r.pregnant)continue;
        var femaleMate=r.dna.sex==='F';
        if(!femaleMate)continue;
        var maleCaste=o.dna.cl,femaleCaste=r.dna.cl;
        var casteGateOrder=[CL.BR,CL.P,CL.W,CL.M,CL.F,CL.BN];
        var mi2=casteGateOrder.indexOf(maleCaste),fi2=casteGateOrder.indexOf(femaleCaste);
        if(mi2<0)mi2=4;if(fi2<0)fi2=4;
        if(Math.abs(mi2-fi2)>1&&Math.random()>0.15)continue;
        if(r.energy>r.dna.rth*0.55)candidates.push(r);
      }
      for(var j=0;j<candidates.length;j++){
        var f=candidates[j];
        var fertile=isFertile(f);
        var appeal=maleAppeal(o,f);
        // Outside fertile window: very reluctant (5% base, appeal barely helps)
        // Inside fertile window: threshold scales with appeal — high-status males accepted easily
        var acceptProb=fertile
          ?(0.40+appeal*0.55)   // fertile: 40-95% — she's interested, standards apply
          :(0.15+appeal*0.20);  // not fertile: 15-35% — life finds a way
        if(Math.random()<acceptProb){
          mate=f;
          f.lastMateClass=o.dna.cl;
          break;
        }else{
          o.energy-=0.2; // gentle rebuff cost
          o.rejectedBy=(o.rejectedBy||0)+1;
        }
      }
      if(mate){
        var childDNA=crossDNA(o.dna,mate.dna);
        if(inFertZone){
          childDNA.met=Math.max(0.010,childDNA.met*(1-FERT_CHILD_BONUS*0.5));
          childDNA.spd=Math.min(2.5,childDNA.spd*(1+FERT_CHILD_BONUS*0.4));
          childDNA.sen=Math.min(140,childDNA.sen*(1+FERT_CHILD_BONUS*0.3));
          childDNA.rth=Math.min(125,childDNA.rth*(1+FERT_CHILD_BONUS*0.2));
        }
        mate.pregnant=true;mate.pregnancyTicks=0;
        mate.pendingChildDNA=childDNA;mate.pendingFather=o;
        o.energy-=o.dna.rco*0.35;o.mateCooldown=repCool;
        mate.energy-=mate.dna.rco*0.25;mate.mateCooldown=repCool*2;
        o.rejectedBy=0; // reset on success
      }
      } // end isMale guard
    }
    // Update female cycle and social bonds every org pass
    if(o.dna.sex==='F'&&!o.isPlant)updateFemaleSocial(o,sgB);
  }

  // PREGNANCY PROGRESSION
  for(var i=0;i<orgs.length;i++){
    var o=orgs[i];
    if(!o.alive||!o.pregnant||o.isPlant)continue;
    o.pregnancyTicks++;
    var pregFrac=o.pregnancyTicks/PREG_MAX;
    // Progressive immobility — velocity damped increasingly
    var immob=pregFrac*0.55;
    o.vx*=(1-immob);o.vy*=(1-immob);
    // Extra hunger — feeding two
    o.energy-=o.dna.met*0.45*pregFrac;
    // Birth
    if(o.pregnancyTicks>=PREG_MAX&&cTotal<MAX_BEINGS){
      var cd=o.pendingChildDNA||makeDNA(o.dna.cl);
      var infant=makeBeing(o.x,o.y,cd,false);
      infant.isInfant=true;infant.infantAge=0;
      infant.mother=o;infant.father=o.pendingFather&&o.pendingFather.alive?o.pendingFather:null;
      infant.energy=14;infant.thirst=0;
      o.infant=infant;
      if(o.pendingFather&&o.pendingFather.alive)o.pendingFather.infant=infant;
      o.pregnant=false;o.pregnancyTicks=0;o.pendingChildDNA=null;
      o.mateCooldown=600; // ~1 month recovery
      newBeings.push(infant);cTotal++;
      // Divine sire — special birth announcement
      if(o.pendingDivineSire){
        var sire=o.pendingDivineSire;var isd=sire.type==='deva';
        if(infant.dna.isBrahma)showBanner(infant.dna.name+' — Brahma is born','#7030a0');
        else if(infant.dna.name)showBanner(infant.dna.name+(isd?' born of light — child of ':' born of shadow — child of ')+sire.name,isd?'#9a7000':'#2a6010');
        flashes.push({x:infant.x,y:infant.y,age:0,max:30,type:isd?'deva_birth':'naga_birth'});
        o.pendingDivineSire=null;
      } else if(isDemigod(infant)&&infant.dna.name)showBanner(infant.dna.name+' is born of light','#9a7000');
      else if(isDemiNaga(infant)&&infant.dna.name)showBanner(infant.dna.name+' is born of shadow','#2a6010');
      else if(isBrahma(infant)&&infant.dna.name)showBanner(infant.dna.name+' — Brahma is born','#7030a0');
      else if(isFounder(infant)&&infant.dna.name)showBanner(infant.dna.name+' enters the world','#6a5030');
    }
  }

  // INFANT LIFECYCLE — attached symbiote, grows to independence
  for(var i=0;i<orgs.length;i++){
    var o=orgs[i];
    if(!o.alive||!o.isInfant)continue;
    o.infantAge++;
    var adolFrac=o.infantAge/ADOL_MAX;
    var mom=o.mother,dad=o.father;
    // Stay physically near mother while young
    if(mom&&mom.alive){
      var mDx=mom.x-o.x,mDy=mom.y-o.y;
      var mDist=Math.sqrt(mDx*mDx+mDy*mDy)||1;
      var pull=adolFrac<0.35?0.80:adolFrac<0.70?0.45:0.18;
      o.vx+=mDx/mDist*pull;o.vy+=mDy/mDist*pull;
      // Mother nurses — bleeds energy to infant
      if(adolFrac<0.65&&mom.energy>20){
        var give=Math.min(mom.energy-18, 0.08*(1-adolFrac*0.6));
        mom.energy-=give;o.energy=Math.min(o.energy+give,80);
      }
      // Mother needs more food while nursing
      if(adolFrac<0.65)mom.energy-=mom.dna.met*0.30;
      // Mother stays near infant — pull back if she wanders
      if(mDist>25){mom.vx+=mDx/mDist*(-0.25);mom.vy+=mDy/mDist*(-0.25);}
    }
    // Father gives altruistically when nearby
    if(dad&&dad.alive){
      var fdDist=dist2(o.x,o.y,dad.x,dad.y);
      if(fdDist<50*50&&dad.energy>30){
        var fGive=Math.min(dad.energy-28,0.05*(1-adolFrac*0.5));
        dad.energy-=fGive;o.energy=Math.min(o.energy+fGive,80);
      }
    }
    // Any nearby same-caste beings also give a little (community feeding)
    if(tick%8===0&&(mom&&mom.alive)){
      var nearMom=sgB.q(mom.x,mom.y,28);
      for(var ni=0;ni<nearMom.length;ni++){
        var nb=nearMom[ni];
        if(!nb.alive||nb.isPlant||nb===mom||nb===dad||nb===o)continue;
        if(nb.dna.cl===mom.dna.cl&&nb.energy>45){
          nb.energy-=0.08;o.energy=Math.min(o.energy+0.06,80);
        }
      }
    }
    // Infant grows — metabolism and capability scale with age
    o.dna.spd=clamp(o.dna.spd*(1+0.0006),0.10,2.5);
    o.energy-=o.dna.met*clamp(adolFrac,0.15,1.0); // full metabolism at maturity
    // Independence
    if(o.infantAge>=ADOL_MAX){
      o.isInfant=false;o.mother=null;o.father=null;
      if(mom&&mom.infant===o)mom.infant=null;
      if(dad&&dad.infant===o)dad.infant=null;
      o.energy=Math.min(o.energy+12,80);
      if(o.dna.name)showBanner(o.dna.name+' comes of age','#c8a040');
    }
  }

  // Divine mating — only with mortal females, produces pregnancy
  function tryDivineMating(divine){
    if(!divine||divine.state!=='ACTIVE'||divine.mateCooldown>0||cTotal>=MAX_BEINGS)return;
    var candidates=sgB.q(divine.x,divine.y,DIVINE_MATE_RANGE);var mortal=null;
    for(var j=0;j<candidates.length;j++){
      var r=candidates[j];
      if(!r.alive||r.isPlant||r.mateCooldown>0||r.isInfant||r.pregnant)continue;
      if(r.dna.sex!=='F')continue;
      if(r.energy>r.dna.rth*0.60){mortal=r;break;}
    }
    if(!mortal||Math.random()>DIVINE_MATE_PROB)return;
    var childDNA=crossDivineWithMortal(divine.dna,mortal.dna);
    mortal.pregnant=true;mortal.pregnancyTicks=0;
    mortal.pendingChildDNA=childDNA;mortal.pendingFather=null;
    mortal.pendingDivineSire={name:divine.name,type:divine.type};
    mortal.energy-=mortal.dna.rco*0.6;mortal.mateCooldown=120;divine.mateCooldown=300;
    var isd=divine.type==='deva';
    flashes.push({x:mortal.x,y:mortal.y,age:0,max:25,type:isd?'deva_birth':'naga_birth'});
  }
  if(deva)tryDivineMating(deva);if(naga)tryDivineMating(naga);

  // Bardo
  var worldFull=cTotal>=MAX_BEINGS*0.85;
  for(var i=bardo.length-1;i>=0;i--){
    var soul=bardo[i];soul.elapsed++;soul.angle+=0.018;
    var ready=soul.elapsed>=soul.wait+(worldFull?50:0);if(!ready)continue;
    if(!soul.isPlant&&cTotal>=MAX_BEINGS){soul.elapsed=soul.wait-10;continue;}
    totalRebirths++;
    var ang=Math.random()*Math.PI*2,dis=15+Math.random()*40;
    var nx2=clamp(soul.x+Math.cos(ang)*dis,4,W-4),ny2=clamp(soul.y+Math.sin(ang)*dis,4,H-4);
    // Don't rebirth inside a wall
    var wci=Math.floor(ny2/CELL)*COLS+Math.floor(nx2/CELL);
    if(wci>=0&&wci<NCELLS&&walls[wci]){nx2=clamp(soul.x,4,W-4);ny2=clamp(soul.y,4,H-4);}
    var child;
    if(soul.isPlant){child=makeBeing(nx2,ny2,mutPlant(soul.dna),true);child.energy=10;}
    else{
      // REBIRTH LADDER — moha target falls as rebirths accumulate
      // Mara's presence in the world pushes souls back down
      var inheritedMoh=soul.dna.moh;
      var rb=soul.dna.rebirths||0;

      // Mara counter-pressure — souls near where Mara walks slide back
      var maraPress=0;
      if(maraBeing&&maraBeing.alive){
        var mrd=dist2(soul.x,soul.y,maraBeing.x,maraBeing.y);
        if(mrd<90*90)maraPress=clamp(0.18*maraIntensity*(1-mrd/(90*90)),0,0.18*maraIntensity);
      }
      // Lesser Maras add quarter pressure each
      for(var mi=0;mi<orgs.length;mi++){
        var mo=orgs[mi];if(!mo.alive||!mo.isLesserMara)continue;
        var lmrd=dist2(soul.x,soul.y,mo.x,mo.y);
        if(lmrd<70*70)maraPress=Math.min(0.30,maraPress+clamp(0.045*maraIntensity*(1-lmrd/(70*70)),0,0.045*maraIntensity));
      }

      // Each tier requires more cycles — progress is slow and real
      var targetMoh;
      if(rb<4)       targetMoh=0.65;  // earth-bound — farmer
      else if(rb<10) targetMoh=0.45;  // merchant
      else if(rb<18) targetMoh=0.25;  // warrior
      else if(rb<28) targetMoh=0.09;  // priest
      else if(rb<40) targetMoh=0.03;  // near-deva
      else           targetMoh=0.01;  // śramaṇa territory

      targetMoh=Math.min(0.65,targetMoh+maraPress); // Mara pushes back

      var nd;
      // THREE-WAY REBIRTH — biological parents + soul's prior-life epigenetic imprint
      // Scan near the spawn point for two living parents
      var epiNearby=sgB?sgB.q(nx2,ny2,60):[];
      var epiPar1=null,epiPar2=null;
      for(var eii=0;eii<epiNearby.length;eii++){
        var eo=epiNearby[eii];
        if(!eo.alive||eo.isPlant||eo.sramana||isBrahma(eo))continue;
        if(!epiPar1){epiPar1=eo;continue;}
        if(eo!==epiPar1){epiPar2=eo;break;}
      }
      var hasEpi=soul.epi&&soul.epi.epiStrength>0.02;
      if(epiPar1&&hasEpi){
        // Biological cross + soul imprint
        nd=epiPar2?crossDNA(epiPar1.dna,epiPar2.dna):mutDNA(epiPar1.dna);
        nd=blendEpi(nd,soul.epi);
        nd.rebirths=soul.dna.rebirths||0;
        // Rebirth ladder still nudges moha — soul's karma shapes the vessel, parents provide it
        nd.moh=clamp(nd.moh*0.68+targetMoh*0.32+randn()*0.05,0,1);
        nd.cl=classify(nd.moh);
        // Hybrid lineage carries forward
        if(soul.dna.isHybrid&&(soul.dna.hybridGen||0)>1){
          nd.isHybrid=true;nd.hybridGen=(soul.dna.hybridGen||2)-1;
          nd.hit=soul.dna.hit*0.7;nd.spd=soul.dna.spd*0.85;
        }
      } else {
        // Solo rebirth — no parents nearby, old behavior
        var nm=clamp(inheritedMoh*0.60+targetMoh*0.40+randn()*0.08,0,1);
        var ncl=classify(nm);
        nd=makeDNA(ncl);
        nd.moh=clamp(nm*0.70+nd.moh*0.30+randn()*0.04,0,1);
        nd.dos=clamp(soul.dna.dos*0.36+nd.dos*0.64+randn()*0.04,0,1);
        nd.lob=clamp(soul.dna.lob*0.36+nd.lob*0.64+randn()*0.04,0,1);
        nd.trace=soul.dna.trace*0.82+randn()*0.02;nd.cl=ncl;
        nd.rebirths=soul.dna.rebirths||0;
        if(soul.dna.isHybrid&&(soul.dna.hybridGen||0)>1){
          nd.isHybrid=true;nd.hybridGen=(soul.dna.hybridGen||2)-1;
          nd.hit=soul.dna.hit*0.7;nd.spd=soul.dna.spd*0.85;
        }
      }
      // Culture persistence — bandit and animal lineage override class when warranted
      if(soul.dna.cl===CL.BN&&Math.random()<0.35)nd.cl=CL.BN;
      if(soul.dna.cl===CL.AN&&rb<3&&Math.random()<0.60)nd.cl=CL.AN;
      nd.founder=clamp((soul.dna.founder||0)*0.4+randn()*0.02,0,1);
      if(nd.founder<0.3)nd.founder=0;
      if(nd.trace>DEMI_THRESH)nd.name=makeDName();
      else if(nd.trace<-DEMI_THRESH)nd.name=makeNName();
      else if(nd.founder>0.3)nd.name=makeFounderName();
      else nd.name='';
      child=makeBeing(nx2,ny2,nd,false);child.energy=20;cTotal++;
      child.rebirths=nd.rebirths; // sync being's rebirth count from DNA
      var sramanaChance=tick<3000?0:clamp((nd.rebirths-20)*0.00004,0,0.00125); // needs 20+ rebirths, very rare
      if(Math.random()<sramanaChance){
        child.sramana=true;
        child.energy=35;
        if(!child.dna.name)child.dna.name=FN1[Math.floor(Math.random()*FN1.length)]+'ji';
        // Birth flash — dramatic entrance
        for(var fi=0;fi<8;fi++)flashes.push({x:nx2+(Math.random()-0.5)*20,y:ny2+(Math.random()-0.5)*20,age:0,max:35,type:'sramana'});
        showBanner((child.dna.name||'one')+' renounces the world','#c8a040');logEvent('sramana_born',{name:child.dna.name,rebirths:child.dna.rebirths||0,cl:nd.cl});
      }
    }
    flashes.push({x:nx2,y:ny2,age:0,max:18,type:'rebirth'});newBeings.push(child);bardo.splice(i,1);
  }

  var pi=0;for(var i=0;i<orgs.length;i++)if(orgs[i].alive)orgs[pi++]=orgs[i];orgs.length=pi;
  for(var i=0;i<newBeings.length;i++)orgs.push(newBeings[i]);
  for(var i=flashes.length-1;i>=0;i--){flashes[i].age++;if(flashes[i].age>=flashes[i].max)flashes.splice(i,1);}

  if(tick%200===0)snapPop();
  if(tick%5===0){
    var p=0,w=0,m=0,f=0,s=0;
    for(var i=0;i<orgs.length;i++){var o=orgs[i];if(!o.alive||o.isPlant)continue;var c=o.dna.cl;if(c===0)p++;else if(c===1)w++;else if(c===2)m++;else if(c===3)f++;if(o.suffering>0.4)s++;}
    hist.p.push(p);hist.w.push(w);hist.m.push(m);hist.f.push(f);hist.s.push(s);
    if(hist.p.length>hist.max){hist.p.shift();hist.w.shift();hist.m.shift();hist.f.shift();hist.s.shift();}
  }
}

var nCvs=document.createElement('canvas');nCvs.width=COLS;nCvs.height=ROWS;
var nctx=nCvs.getContext('2d');var imgData=nctx.createImageData(COLS,ROWS);

// WALL OFFSCREEN CANVAS — baked once per map, blitted each frame
var wallCvs=document.createElement('canvas');wallCvs.width=W;wallCvs.height=H;
var wallCtx=wallCvs.getContext('2d');
var wallDirty=true; // set true whenever walls change (new map only)

function bakeWalls(){
  wallCtx.clearRect(0,0,W,H);
  // Lake
  if(LAKE_EXISTS){
    for(var i=0;i<NCELLS;i++){
      if(!lakeCells[i])continue;
      var lx=(i%COLS)*CELL,ly=Math.floor(i/COLS)*CELL;
      wallCtx.fillStyle='rgba(40,105,175,0.68)';
      wallCtx.fillRect(lx,ly,CELL,CELL);
    }
  }
  // Walls with depth shading
  for(var i=0;i<NCELLS;i++){
    if(!walls[i])continue;
    var wx=(i%COLS)*CELL,wy=Math.floor(i/COLS)*CELL;
    var depth=rockDepth[i]||0;
    var base=depth<3?148-depth*4:depth<6?132-depth*2:118-depth;
    var shade=clamp(base,95,165);
    wallCtx.fillStyle='rgb('+shade+','+(shade-18)+','+(shade-28)+')';
    wallCtx.fillRect(wx,wy,CELL,CELL);
    if(depth<4){wallCtx.fillStyle='rgba(220,205,185,'+(0.12+depth*0.04).toFixed(2)+')';wallCtx.fillRect(wx,wy,CELL,3);}
    wallCtx.fillStyle='rgba(30,20,10,'+(0.10+depth*0.04).toFixed(2)+')';
    wallCtx.fillRect(wx+CELL-2,wy,2,CELL);
  }
  // Rock paths
  for(var i=0;i<NCELLS;i++){
    if(!pathCells[i]||walls[i])continue;
    wallCtx.fillStyle='rgba(185,165,120,0.35)';
    wallCtx.fillRect((i%COLS)*CELL,Math.floor(i/COLS)*CELL,CELL,CELL);
  }
  // Trees (static — don't pulse, save that for live canvas)
  for(var ti=0;ti<treeCells.length;ti++){
    var tr=treeCells[ti];
    if(tr.variant==='forest'){
      var tg=wallCtx.createRadialGradient(tr.x,tr.y,tr.r*0.15,tr.x,tr.y,tr.r);
      tg.addColorStop(0,'rgba(28,78,28,0.88)');tg.addColorStop(0.6,'rgba(35,90,25,0.65)');tg.addColorStop(1,'rgba(20,60,15,0)');
      wallCtx.beginPath();wallCtx.arc(tr.x,tr.y,tr.r,0,Math.PI*2);wallCtx.fillStyle=tg;wallCtx.fill();
      wallCtx.beginPath();wallCtx.arc(tr.x,tr.y,tr.r*0.38,0,Math.PI*2);wallCtx.fillStyle='rgba(18,55,18,0.80)';wallCtx.fill();
    }else if(tr.variant==='willow'){
      var tg=wallCtx.createRadialGradient(tr.x,tr.y-tr.r*0.2,tr.r*0.1,tr.x,tr.y,tr.r*1.3);
      tg.addColorStop(0,'rgba(80,140,55,0.75)');tg.addColorStop(0.7,'rgba(60,115,40,0.45)');tg.addColorStop(1,'rgba(50,100,30,0)');
      wallCtx.beginPath();wallCtx.ellipse(tr.x,tr.y,tr.r*0.7,tr.r*1.1,0,0,Math.PI*2);wallCtx.fillStyle=tg;wallCtx.fill();
    }else{
      wallCtx.beginPath();wallCtx.arc(tr.x,tr.y,tr.r*0.7,0,Math.PI*2);wallCtx.fillStyle='rgba(55,100,35,0.50)';wallCtx.fill();
      wallCtx.beginPath();wallCtx.arc(tr.x+tr.r*0.3,tr.y-tr.r*0.2,tr.r*0.45,0,Math.PI*2);wallCtx.fillStyle='rgba(65,110,40,0.42)';wallCtx.fill();
    }
  }
  wallDirty=false;
}

function drawWorld(){
  var d=imgData.data;
  for(var i=0;i<NCELLS;i++){
    var n=wildNutrient[i],pn=plotNutrient[i],ps=plotStrength[i],idx=i*4;
    var cx=i%COLS,cy=Math.floor(i/COLS);
    var onFarm=inFarmPlot(cx,cy);    if(onFarm){
      // Farm plot — warm golden-green
      d[idx]=Math.floor(200-ps*30-pn*20);
      d[idx+1]=Math.floor(185+ps*25+pn*35);
      d[idx+2]=Math.floor(120-ps*40-pn*40);
    }else{
      // Wild terrain
      d[idx]=Math.floor(238-n*50);d[idx+1]=Math.floor(226-n*18+n*48);d[idx+2]=Math.floor(203-n*58);
    }
    d[idx+3]=255;
  }
  if(activeEv){
    var e=activeEv,prog=e.life/e.maxLife,alpha=(1-prog)*0.22;
    var ec={bloom:[0,80,0],drought:[80,40,-40],plague_w:[80,0,0],plague_f:[40,60,0],monsoon:[0,20,80],famine:[60,30,-30]};
    var ecv=ec[e.type]||[0,0,0];
    for(var dy=-e.r;dy<=e.r;dy++)for(var dx=-e.r;dx<=e.r;dx++){
      var nx=e.cx+dx,ny=e.cy+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      var dd=Math.sqrt(dx*dx+dy*dy);if(dd>e.r)continue;
      var f=(1-dd/e.r)*alpha,idx=(ny*COLS+nx)*4;
      d[idx]=clamp(d[idx]+Math.floor(ecv[0]*f),0,255);d[idx+1]=clamp(d[idx+1]+Math.floor(ecv[1]*f),0,255);d[idx+2]=clamp(d[idx+2]+Math.floor(ecv[2]*f),0,255);
    }
  }
  nctx.putImageData(imgData,0,0);wctx.drawImage(nCvs,0,0,W,H);

  // Draw all farm plot borders
  wctx.strokeStyle='rgba(120,90,30,0.5)';wctx.lineWidth=2;
  for(var fi=0;fi<FARMS.length;fi++){
    var fp=FARMS[fi];
    wctx.strokeRect(fp.x1*CELL,fp.y1*CELL,(fp.x2-fp.x1+1)*CELL,(fp.y2-fp.y1+1)*CELL);
  }

  // STATIC TERRAIN LAYER — blit baked offscreen canvas (walls, lake, trees, paths)
  // bakeWalls() called once on map generation; lake shimmer handled separately below
  if(wallDirty)bakeWalls();
  wctx.drawImage(wallCvs,0,0);

  // LAKE SHIMMER — animated on top of baked layer
  if(LAKE_EXISTS){
    var shimmerX=(Math.sin(tick*0.008)*0.5+0.5)*W;
    for(var i=0;i<NCELLS;i++){
      if(!lakeCells[i])continue;
      var lx=(i%COLS)*CELL,ly=Math.floor(i/COLS)*CELL;
      var ripple=0.08+0.06*Math.sin(tick*0.020+(i%COLS)*0.35+(Math.floor(i/COLS))*0.28);
      var dx=lx-shimmerX,nearShimmer=Math.exp(-dx*dx/(W*W*0.04));
      var alpha=(ripple+nearShimmer*0.12).toFixed(3);
      wctx.fillStyle='rgba(140,200,255,'+alpha+')';
      wctx.fillRect(lx,ly,CELL,CELL);
    }
  }

  // STOREHOUSES
  for(var i=0;i<storehouses.length;i++){
    var s=storehouses[i];var fullness=s.food/STOREHOUSE_MAX;var sz=10+fullness*6;
    wctx.fillStyle='rgba(0,0,0,0.08)';wctx.fillRect(s.x-sz/2+2,s.y-sz/2+2,sz,sz*1.1);
    wctx.fillStyle='rgba(140,100,40,'+(0.75+fullness*0.2)+')';wctx.fillRect(s.x-sz/2,s.y-sz/2,sz,sz*1.1);
    wctx.fillStyle='rgba(160,120,50,0.9)';wctx.beginPath();wctx.moveTo(s.x-sz/2-2,s.y-sz/2);wctx.lineTo(s.x,s.y-sz/2-5);wctx.lineTo(s.x+sz/2+2,s.y-sz/2);wctx.closePath();wctx.fill();
    if(fullness>0){wctx.fillStyle='rgba(220,180,60,'+(0.5+fullness*0.3)+')';wctx.fillRect(s.x-sz/2+1,s.y-sz/2+sz*1.1*(1-fullness),sz-2,sz*1.1*fullness);}
    wctx.fillStyle='rgba(80,50,10,0.7)';wctx.font='7px Georgia';wctx.textAlign='center';wctx.fillText(Math.floor(s.food),s.x,s.y+sz/2+10);
  }

  // PONDS — clearly visible water bodies
  for(var pi=0;pi<PONDS.length;pi++){
    var pd=PONDS[pi];var pu=pd.purity;
    var lv=clamp(pd.level||0,0,1);
    var capV=pd.cap||pu;
    var fade=capV>0?clamp(lv/capV,0,1):0.3;
    // Color: high purity = clear blue, low = murky green-blue
    var pr=Math.floor(30+60*(1-pu)),pg=Math.floor(100+60*pu),pb=Math.floor(175+55*pu);
    var visR=Math.max(4,pd.r*Math.max(0.4,fade));
    // Solid fill at center, fade at edge
    var pg2=wctx.createRadialGradient(pd.x,pd.y,visR*0.15,pd.x,pd.y,visR);
    var centerAlpha=(0.72+pu*0.20).toFixed(2);
    var edgeAlpha=(0.20).toFixed(2);
    pg2.addColorStop(0,'rgba('+pr+','+pg+','+pb+','+centerAlpha+')');
    pg2.addColorStop(0.65,'rgba('+pr+','+pg+','+pb+','+((pu*0.4+0.25).toFixed(2))+')');
    pg2.addColorStop(1,'rgba('+pr+','+pg+','+pb+','+edgeAlpha+')');
    wctx.beginPath();wctx.arc(pd.x,pd.y,visR,0,Math.PI*2);
    wctx.fillStyle=pg2;wctx.fill();
    // Animated shimmer ring
    if(visR>6){
      var rph=(tick*0.018+pi*0.9)%(Math.PI*2);
      var ra=(0.25+0.15*Math.abs(Math.sin(rph))).toFixed(2);
      wctx.beginPath();wctx.arc(pd.x,pd.y,visR*0.55,0,Math.PI*2);
      wctx.strokeStyle='rgba('+(pr+50)+','+(pg+40)+','+(pb+15)+','+ra+')';
      wctx.lineWidth=1.5;wctx.stroke();
    }
    // Sacred source marker
    if(pi===0&&visR>10){
      wctx.strokeStyle='rgba(80,160,220,0.55)';wctx.lineWidth=1.5;
      wctx.beginPath();wctx.arc(pd.x,pd.y,visR+3,0,Math.PI*2);wctx.stroke();
    }
  }

  // CANALS — thin water lines
  for(var ci2=0;ci2<CANALS.length;ci2++){
    var cn=CANALS[ci2];if(!cn.pts||cn.pts.length<2)continue;
    var pu=cn.purity;
    var cr=Math.floor(50+80*(1-pu)),cg=Math.floor(130+40*pu),cb=Math.floor(170+55*pu);
    var cAlpha=(0.35+pu*0.25).toFixed(2);
    wctx.beginPath();
    wctx.moveTo(cn.pts[0].x,cn.pts[0].y);
    for(var cpi=1;cpi<cn.pts.length;cpi++)wctx.lineTo(cn.pts[cpi].x,cn.pts[cpi].y);
    wctx.strokeStyle='rgba('+cr+','+cg+','+cb+','+cAlpha+')';
    wctx.lineWidth=cn.width;
    wctx.lineCap='round';wctx.lineJoin='round';
    wctx.stroke();
    // Subtle shimmer on top
    var shimmer=0.06+0.04*Math.sin(tick*0.025+ci2);
    wctx.strokeStyle='rgba(180,220,255,'+shimmer+')';
    wctx.lineWidth=1;wctx.stroke();
  }
  // NW PRAYER ZONE — sacred ground, pulsing pale gold
  var pzg=wctx.createRadialGradient(PRAYER_ZONE_X,PRAYER_ZONE_Y,4,PRAYER_ZONE_X,PRAYER_ZONE_Y,PRAYER_ZONE_R);
  pzg.addColorStop(0,'rgba(255,245,180,0.20)');pzg.addColorStop(0.6,'rgba(240,220,120,0.09)');pzg.addColorStop(1,'rgba(220,190,80,0)');
  wctx.beginPath();wctx.arc(PRAYER_ZONE_X,PRAYER_ZONE_Y,PRAYER_ZONE_R,0,Math.PI*2);wctx.fillStyle=pzg;wctx.fill();
  var ppulse=0.04+Math.sin(tick*0.025)*0.025;
  wctx.beginPath();wctx.arc(PRAYER_ZONE_X,PRAYER_ZONE_Y,PRAYER_ZONE_R,0,Math.PI*2);
  wctx.strokeStyle='rgba(255,225,90,'+ppulse+')';wctx.lineWidth=1.5;wctx.stroke();

  // FERTILITY ZONES — NE and SW, warm amber glow
  var fertZones=[{x:FERT_X,y:FERT_Y,r:FERT_R},{x:FERT_X2,y:FERT_Y2,r:FERT_R2}];
  for(var fzi=0;fzi<fertZones.length;fzi++){
    var fz=fertZones[fzi];
    var fg=wctx.createRadialGradient(fz.x,fz.y,5,fz.x,fz.y,fz.r);
    fg.addColorStop(0,'rgba(210,160,60,0.22)');fg.addColorStop(0.7,'rgba(190,130,40,0.10)');fg.addColorStop(1,'rgba(180,110,20,0)');
    wctx.beginPath();wctx.arc(fz.x,fz.y,fz.r,0,Math.PI*2);wctx.fillStyle=fg;wctx.fill();
    var fpulse=0.06+Math.sin(tick*0.04+fzi*1.5)*0.03;
    wctx.beginPath();wctx.arc(fz.x,fz.y,fz.r,0,Math.PI*2);
    wctx.strokeStyle='rgba(210,160,50,'+fpulse+')';wctx.lineWidth=2;wctx.stroke();
  }

  // BANDIT DEN — dark marker at wall crevice
  if(BANDIT_DEN_X>0){
    wctx.beginPath();wctx.arc(BANDIT_DEN_X,BANDIT_DEN_Y,6,0,Math.PI*2);
    wctx.fillStyle='rgba(28,22,18,0.75)';wctx.fill();
    wctx.strokeStyle='rgba(120,40,20,0.6)';wctx.lineWidth=1.5;wctx.stroke();
    if(denFood>0){
      wctx.fillStyle='rgba(160,60,20,0.8)';wctx.font='6px Georgia';wctx.textAlign='center';
      wctx.fillText(Math.floor(denFood),BANDIT_DEN_X,BANDIT_DEN_Y+10);
    }
  }

  // Terrain glow for divines
  function terrGlow(dm){
    var isN=dm.type==='asura',fd=demiFade(dm);
    var g=wctx.createRadialGradient(dm.x,dm.y,0,dm.x,dm.y,90);
    if(isN){g.addColorStop(0,'rgba(40,120,20,'+(0.14*fd)+')');g.addColorStop(1,'rgba(40,120,20,0)');}
    else{g.addColorStop(0,'rgba(255,220,60,'+(0.12*fd)+')');g.addColorStop(1,'rgba(255,220,60,0)');}
    wctx.beginPath();wctx.arc(dm.x,dm.y,90,0,Math.PI*2);wctx.fillStyle=g;wctx.fill();
  }
  if(naga)terrGlow(naga);if(deva)terrGlow(deva);

  // TEMPLES — one per quadrant, small stone structures
  for(var ti=0;ti<TEMPLES.length;ti++){
    var tx=TEMPLES[ti].x,ty=TEMPLES[ti].y,tsz=10;
    wctx.fillStyle='rgba(160,140,110,0.90)';
    wctx.fillRect(tx-tsz/2,ty-tsz*1.2,tsz,tsz*1.4);
    wctx.fillStyle='rgba(130,110,80,0.90)';
    wctx.beginPath();wctx.moveTo(tx-tsz*0.7,ty-tsz*1.2);
    wctx.lineTo(tx,ty-tsz*2.0);wctx.lineTo(tx+tsz*0.7,ty-tsz*1.2);
    wctx.closePath();wctx.fill();
    // Prayer glow
    if(prayerCharge>0.1){
      var tg=wctx.createRadialGradient(tx,ty,2,tx,ty,tsz*2);
      tg.addColorStop(0,'rgba(255,210,80,'+(prayerCharge*0.3)+')');
      tg.addColorStop(1,'rgba(255,180,40,0)');
      wctx.beginPath();wctx.arc(tx,ty,tsz*2,0,Math.PI*2);
      wctx.fillStyle=tg;wctx.fill();
    }
  }

  // ALTAR — sacrifice point, center-west
  var altarGlow=0.4+prayerCharge*0.7+Math.sin(tick*0.04)*0.15;
  function drawAltar(ax,ay){
    // Stone platform base
    wctx.fillStyle='rgba(90,72,48,0.95)';
    wctx.fillRect(ax-14,ay+4,28,7);
    wctx.fillStyle='rgba(110,88,58,0.95)';
    wctx.fillRect(ax-11,ay-2,22,8);
    // Stone top slab
    wctx.fillStyle='rgba(145,118,75,0.98)';
    wctx.fillRect(ax-13,ay-5,26,7);
    // Edge highlight

    wctx.fillRect(ax-13,ay-5,26,2);
    // Outer glow — always visible, prayer makes it brighter
    var ag=wctx.createRadialGradient(ax,ay,4,ax,ay,32);
    ag.addColorStop(0,'rgba(255,210,60,'+(altarGlow*0.7)+')');
    ag.addColorStop(0.5,'rgba(220,140,20,'+(altarGlow*0.28)+')');
    ag.addColorStop(1,'rgba(180,80,0,0)');
    wctx.beginPath();wctx.arc(ax,ay,32,0,Math.PI*2);
    wctx.fillStyle=ag;wctx.fill();
    // Flame — always lit, grows with prayer
    var flameH=6+prayerCharge*10;
    var fg=wctx.createRadialGradient(ax,ay-8,1,ax,ay-8,flameH);
    fg.addColorStop(0,'rgba(255,255,180,0.98)');
    fg.addColorStop(0.35,'rgba(255,160,20,0.85)');
    fg.addColorStop(0.7,'rgba(220,60,0,0.50)');
    fg.addColorStop(1,'rgba(180,20,0,0)');
    wctx.beginPath();wctx.arc(ax,ay-8,flameH,0,Math.PI*2);
    wctx.fillStyle=fg;wctx.fill();
    // Flame core
    wctx.beginPath();wctx.arc(ax,ay-8,2.5+prayerCharge*2,0,Math.PI*2);
    wctx.fillStyle='rgba(255,255,220,0.95)';wctx.fill();
  }
  drawAltar(ALTAR_X,ALTAR_Y);
  for(var sfi2=sacrificeFlashes.length-1;sfi2>=0;sfi2--){
    var sf2=sacrificeFlashes[sfi2];sf2.age++;
    var st=sf2.age/sf2.max,sr2=5+st*35,sa=(1-st)*(1-st);
    wctx.beginPath();wctx.arc(sf2.x,sf2.y,sr2,0,Math.PI*2);
    wctx.strokeStyle='rgba(255,220,60,'+sa+')';wctx.lineWidth=2.5;wctx.stroke();
    wctx.beginPath();wctx.arc(sf2.x,sf2.y,sr2*0.5,0,Math.PI*2);
    wctx.strokeStyle='rgba(255,255,180,'+sa*0.7+')';wctx.lineWidth=1.5;wctx.stroke();
    if(sf2.age>=sf2.max)sacrificeFlashes.splice(sfi2,1);
  }
  if(altarFood>0){
    wctx.fillStyle='rgba(200,160,50,0.92)';wctx.font='bold 8px Georgia';
    wctx.textAlign='center';wctx.fillText(Math.floor(altarFood),ALTAR_X,ALTAR_Y+17);
  }

  // SE ALTAR
  drawAltar(ALTAR2_X,ALTAR2_Y);

  // NE TREES — scattered in animal territory
  var trees=[
    {x:W*0.68,y:H*0.08},{x:W*0.75,y:H*0.14},{x:W*0.82,y:H*0.06},
    {x:W*0.90,y:H*0.18},{x:W*0.70,y:H*0.32},{x:W*0.85,y:H*0.38},
    {x:W*0.78,y:H*0.45},{x:W*0.95,y:H*0.10}
  ];
  var treeSway=Math.sin(tick*0.018)*0.6;
  for(var ti=0;ti<trees.length;ti++){
    var tr=trees[ti];
    var ts=5+Math.sin(ti*2.3)*1.5; // slight size variation
    // Trunk
    wctx.fillStyle='rgba(100,65,30,0.85)';
    wctx.beginPath();wctx.rect(tr.x-1.2,tr.y,2.4,ts*0.9);wctx.fill();
    // Canopy layers — dark green, organic
    wctx.fillStyle='rgba(45,85,30,0.82)';
    wctx.beginPath();wctx.ellipse(tr.x+treeSway*0.3,tr.y-ts*0.3,ts*1.1,ts*0.85,0,0,Math.PI*2);wctx.fill();
    wctx.fillStyle='rgba(55,105,38,0.78)';

    }else if(o.isMara){

    }else if(o.isSamma){

      var g1=wctx.createRadialGradient(o.x,o.y,orbR*0.2,o.x,o.y,orbR*1.8);

      g1.addColorStop(1,'rgba(180,40,0,0)');
      wctx.beginPath();wctx.arc(o.x,o.y,orbR*1.8,0,Math.PI*2);

      var bodyR,bodyG,bodyB;

      // Suffering pulse
      if(suf>0.35){wctx.beginPath();wctx.arc(o.x,o.y,r+3+suf*2,0,Math.PI*2);wctx.fillStyle='rgba(180,40,40,'+(suf*0.07)+')';wctx.fill();wctx.fillStyle=bFill;}

      if(cl===CL.P){
        // PRIEST — circle, prayer pulse
        wctx.beginPath();wctx.arc(o.x,o.y,r,0,Math.PI*2);wctx.fill();wctx.stroke();
        if(o.isPraying){var pg=0.5+Math.sin(tick*0.2)*0.3;wctx.beginPath();wctx.arc(o.x,o.y,r+4+pg*3,0,Math.PI*2);wctx.strokeStyle='rgba(255,215,80,'+(pg*0.50)+')';wctx.lineWidth=1.5;wctx.stroke();}
      }else if(cl===CL.W){
        // WARRIOR — triangle + forward spear
        var ang2=Math.atan2(o.vy,o.vx);
        if(Math.sqrt(o.vx*o.vx+o.vy*o.vy)<0.1)ang2=-Math.PI/2;
        wctx.beginPath();
        wctx.moveTo(o.x+Math.cos(ang2)*r*1.25,o.y+Math.sin(ang2)*r*1.25);
        wctx.lineTo(o.x+Math.cos(ang2+2.35)*r*0.95,o.y+Math.sin(ang2+2.35)*r*0.95);
        wctx.lineTo(o.x+Math.cos(ang2-2.35)*r*0.95,o.y+Math.sin(ang2-2.35)*r*0.95);
        wctx.closePath();wctx.fill();wctx.stroke();
        var sx=o.x+Math.cos(ang2)*r*1.2,sy=o.y+Math.sin(ang2)*r*1.2;
        var ex=o.x+Math.cos(ang2)*r*3.0,ey=o.y+Math.sin(ang2)*r*3.0;
        wctx.beginPath();wctx.moveTo(sx,sy);wctx.lineTo(ex,ey);
        wctx.strokeStyle='rgba(100,70,30,0.80)';wctx.lineWidth=1.0;wctx.stroke();
        wctx.beginPath();wctx.moveTo(ex,ey);
        wctx.lineTo(ex+Math.cos(ang2+2.6)*r*0.5,ey+Math.sin(ang2+2.6)*r*0.5);
        wctx.lineTo(ex+Math.cos(ang2)*r*0.65,ey+Math.sin(ang2)*r*0.65);
        wctx.lineTo(ex+Math.cos(ang2-2.6)*r*0.5,ey+Math.sin(ang2-2.6)*r*0.5);
        wctx.closePath();wctx.fillStyle='rgba(180,160,100,0.88)';wctx.fill();
      }else if(cl===CL.M){
        // MERCHANT — diamond
        wctx.beginPath();
        wctx.moveTo(o.x,o.y-r*1.15);wctx.lineTo(o.x+r*0.85,o.y);
        wctx.lineTo(o.x,o.y+r*1.15);wctx.lineTo(o.x-r*0.85,o.y);
        wctx.closePath();wctx.fill();wctx.stroke();
        if(o.carrying>0){var cw=r*1.5*Math.min(o.carrying/30,1);wctx.fillStyle='rgba(255,220,80,0.70)';wctx.fillRect(o.x-r*0.75,o.y+r+2,cw,2);}
      }else if(cl===CL.F){
        // FARMER — cross
        var arm=r,th=r*0.42;
        wctx.beginPath();wctx.rect(o.x-th/2,o.y-arm,th,arm*2);wctx.fill();wctx.stroke();
        wctx.beginPath();wctx.rect(o.x-arm,o.y-th/2,arm*2,th);wctx.fill();wctx.stroke();
        if(o.carrying>5){wctx.beginPath();wctx.arc(o.x+arm*0.7,o.y-arm*0.7,2,0,Math.PI*2);wctx.fillStyle='rgba(255,220,80,0.9)';wctx.fill();}
      }

      // Crown — on the ruler, sized by retinue power, half previous size
      var oQ=getQuadrant(o.x,o.y);
      if(quadRulers[oQ]===o){
        if(courtsVisible){
          // Count retinue power for this ruler
          var retPower=(o.dominance||0);
          var nearR=sgB.q(o.x,o.y,80);
          for(var ri=0;ri<nearR.length;ri++){
            var rb=nearR[ri];
            if(rb.alive&&!rb.isPlant&&rb!==o&&getQuadrant(rb.x,rb.y)===oQ)retPower+=(rb.dominance||0);
          }
          var pScale=clamp(Math.log(1+retPower*0.8)/Math.log(20),0,1);
          var cSz=Math.round(8+pScale*10); // 8-18px (half of 16-36)
          wctx.font=cSz+'px serif';
          wctx.textAlign='center';
          wctx.textBaseline='bottom';
          wctx.globalAlpha=0.70+pScale*0.25;
          wctx.fillText('👑',o.x,o.y-r*2.2);
          wctx.globalAlpha=1.0;
        }else{
          // Always-on small canvas crown shape (not emoji) when toggle is off
          var cr=r*0.6;
          wctx.fillStyle='rgba(220,180,30,0.88)';
          wctx.beginPath();
          wctx.moveTo(o.x-cr,o.y-r*1.8);
          wctx.lineTo(o.x-cr*0.5,o.y-r*2.4);
          wctx.lineTo(o.x,o.y-r*1.9);
          wctx.lineTo(o.x+cr*0.5,o.y-r*2.4);
          wctx.lineTo(o.x+cr,o.y-r*1.8);
          wctx.closePath();wctx.fill();
          wctx.strokeStyle='rgba(160,120,10,0.70)';wctx.lineWidth=0.6;wctx.stroke();
        }
      }
      // Blood lineage ring
      if(trace>0.08){
        var t2=clamp(trace,0,1);
        wctx.beginPath();wctx.arc(o.x,o.y,r+3,0,Math.PI*2);
        wctx.strokeStyle='rgba(60,120,255,'+(0.40+t2*0.55).toFixed(2)+')';
        wctx.lineWidth=1.5+t2*1.5;wctx.stroke();
      }else if(trace<-0.08){
        var t2=clamp(Math.abs(trace),0,1);
        wctx.beginPath();wctx.arc(o.x,o.y,r+3,0,Math.PI*2);
        wctx.strokeStyle='rgba(200,80,0,'+(0.40+t2*0.55).toFixed(2)+')';
        wctx.lineWidth=1.5+t2*1.5;wctx.stroke();
      }
    }
  }

  // Visiting divines — on top
  function drawDivine(dm){
    var isN=dm.type==='asura',fd=demiFade(dm);
    wctx.save();wctx.globalAlpha=isN?0.72:0.68;
    var pulse=0.88+Math.sin(dm.phase)*0.12,rp=(isN?22:24)*pulse*fd;
    var g=wctx.createRadialGradient(dm.x,dm.y,rp*0.3,dm.x,dm.y,rp*2.2);
    if(isN){g.addColorStop(0,'rgba(60,180,40,'+(0.38*fd)+')');g.addColorStop(0.5,'rgba(40,140,20,'+(0.16*fd)+')');g.addColorStop(1,'rgba(40,140,20,0)');}
    else{g.addColorStop(0,'rgba(255,230,80,'+(0.42*fd)+')');g.addColorStop(0.5,'rgba(240,200,40,'+(0.20*fd)+')');g.addColorStop(1,'rgba(240,200,40,0)');}
    wctx.beginPath();wctx.arc(dm.x,dm.y,rp*2.2,0,Math.PI*2);wctx.fillStyle=g;wctx.fill();
    wctx.beginPath();wctx.arc(dm.x,dm.y,rp,0,Math.PI*2);
    wctx.fillStyle=isN?'rgba(55,165,35,'+(0.88*fd)+')':'rgba(245,210,55,'+(0.92*fd)+')';wctx.fill();
    wctx.strokeStyle=isN?'rgba(20,80,10,'+fd+')':'rgba(160,120,0,'+fd+')';wctx.lineWidth=2.5;wctx.stroke();
    wctx.save();wctx.translate(dm.x,dm.y);wctx.rotate(tick*(isN?0.03:0.015));
    if(isN){wctx.beginPath();for(var a=0;a<Math.PI*3;a+=0.15){var sr=rp*0.55*(a/(Math.PI*3));var px=Math.cos(a)*sr,py=Math.sin(a)*sr;if(a<0.15)wctx.moveTo(px,py);else wctx.lineTo(px,py);}wctx.strokeStyle='rgba(220,255,180,'+(0.65*fd)+')';wctx.lineWidth=1.5;wctx.stroke();wctx.beginPath();wctx.arc(-rp*0.28,-rp*0.12,2.5,0,Math.PI*2);wctx.fillStyle='rgba(255,80,30,'+(0.9*fd)+')';wctx.fill();wctx.beginPath();wctx.arc(rp*0.28,-rp*0.12,2.5,0,Math.PI*2);wctx.fillStyle='rgba(255,80,30,'+(0.9*fd)+')';wctx.fill();}
    else{for(var k=0;k<12;k++){var ang2=(k/12)*Math.PI*2;var r1=rp*0.55,r2=rp*(k%2===0?1.1:0.9);wctx.beginPath();wctx.moveTo(Math.cos(ang2)*r1,Math.sin(ang2)*r1);wctx.lineTo(Math.cos(ang2)*r2,Math.sin(ang2)*r2);wctx.strokeStyle='rgba(255,255,200,'+(0.55*fd)+')';wctx.lineWidth=1.2;wctx.stroke();}wctx.beginPath();wctx.arc(0,0,rp*0.35,0,Math.PI*2);wctx.fillStyle='rgba(255,255,220,'+(0.72*fd)+')';wctx.fill();}
    wctx.restore(); // inner rotate
    wctx.restore(); // outer globalAlpha
  }
  if(naga)drawDivine(naga);if(deva)drawDivine(deva);

  // PREGNANCY & INFANT DRAWING
  for(var i=0;i<orgs.length;i++){
    var o=orgs[i];if(!o.alive||o.isPlant)continue;
    // Fertile window — small warm glow on receptive females
    if(o.dna.sex==='F'&&!o.isPlant&&!o.pregnant&&!o.isInfant&&isFertile(o)){
      var fwR=(CL_SZ[Math.min(o.dna.cl,7)]||5)*1.6;
      wctx.beginPath();wctx.arc(o.x,o.y,fwR,0,Math.PI*2);
      wctx.strokeStyle='rgba(240,160,180,0.55)';wctx.lineWidth=1.5;wctx.stroke();
    }
    if(o.pregnant){
      var pf=o.pregnancyTicks/PREG_MAX;
      var baseR2=CL_SZ[Math.min(o.dna.cl,7)]||5;
      var bellySz=baseR2*(0.5+pf*0.9);
      var by=o.y+baseR2*0.7;
      var bg=wctx.createRadialGradient(o.x,by,0,o.x,by,bellySz);
      bg.addColorStop(0,'rgba(255,190,180,0.82)');
      bg.addColorStop(0.6,'rgba(240,140,130,0.45)');
      bg.addColorStop(1,'rgba(220,100,100,0)');
      wctx.beginPath();wctx.arc(o.x,by,bellySz,0,Math.PI*2);
      wctx.fillStyle=bg;wctx.fill();
      // Tiny pulse heartbeat at last trimester
      if(pf>0.6){
        var hb=0.5+Math.sin(tick*0.25)*0.5;
        wctx.beginPath();wctx.arc(o.x,by,bellySz*0.22*hb,0,Math.PI*2);
        wctx.fillStyle='rgba(220,80,80,'+(0.35+hb*0.25)+')';wctx.fill();
      }
    }
    // Infant tether — draw line from mother to infant, infant dot
    if(o.isInfant&&o.mother&&o.mother.alive){
      var af=o.infantAge/ADOL_MAX;
      var tetherAlpha=Math.max(0,0.7-af*0.9);
      if(tetherAlpha>0.02){
        wctx.beginPath();
        wctx.moveTo(o.mother.x,o.mother.y);
        wctx.lineTo(o.x,o.y);
        wctx.strokeStyle='rgba(200,140,100,'+tetherAlpha+')';
        wctx.lineWidth=1.2;wctx.setLineDash([3,3]);wctx.stroke();wctx.setLineDash([]);
      }
      // Infant orb — small, grows with age
      var infR=Math.max(1.5,(CL_SZ[Math.min(o.dna.cl,7)]||5)*clamp(0.15+af*0.85,0.15,1.0));
      var infCol=o.dna.sex==='F'?'rgba(230,160,180,0.88)':'rgba(160,190,230,0.88)';
      wctx.beginPath();wctx.arc(o.x,o.y,infR,0,Math.PI*2);
      wctx.fillStyle=infCol;wctx.fill();
      wctx.strokeStyle='rgba(100,60,20,0.5)';wctx.lineWidth=0.8;wctx.stroke();
    }
  }

  // CHAKKAVARTIN — golden wheel-orb, radiates sovereign light
  if(chakkavartinBeing&&chakkavartinBeing.alive){
    var ck=chakkavartinBeing;
    var ckAge=tick-chakkavartinTick;
    var ckPulse=0.90+Math.sin(tick*0.06)*0.10;
    var ckR=14*ckPulse;
    // Outer sovereign glow — gold, large
    var ckg=wctx.createRadialGradient(ck.x,ck.y,ckR*0.2,ck.x,ck.y,ckR*3.0);
    ckg.addColorStop(0,'rgba(255,220,60,0.45)');
    ckg.addColorStop(0.5,'rgba(240,180,20,0.18)');
    ckg.addColorStop(1,'rgba(200,140,0,0)');
    wctx.beginPath();wctx.arc(ck.x,ck.y,ckR*3.0,0,Math.PI*2);
    wctx.fillStyle=ckg;wctx.fill();
    // Rotating wheel spokes — dharma wheel, 8 spokes
    wctx.save();wctx.translate(ck.x,ck.y);wctx.rotate(tick*0.025);
    wctx.strokeStyle='rgba(255,230,80,0.65)';wctx.lineWidth=1.8;
    for(var sp=0;sp<8;sp++){
      var sa=sp/8*Math.PI*2;
      wctx.beginPath();wctx.moveTo(Math.cos(sa)*ckR*0.38,Math.sin(sa)*ckR*0.38);
      wctx.lineTo(Math.cos(sa)*ckR*1.1,Math.sin(sa)*ckR*1.1);wctx.stroke();
    }
    // Outer rim
    wctx.beginPath();wctx.arc(0,0,ckR*1.1,0,Math.PI*2);
    wctx.strokeStyle='rgba(255,210,50,0.60)';wctx.lineWidth=2;wctx.stroke();
    wctx.restore();
    // Core orb
    var ckc=wctx.createRadialGradient(ck.x,ck.y,0,ck.x,ck.y,ckR*0.9);
    ckc.addColorStop(0,'rgba(255,255,200,1.0)');
    ckc.addColorStop(0.5,'rgba(255,220,60,0.92)');
    ckc.addColorStop(1,'rgba(200,160,10,0.70)');
    wctx.beginPath();wctx.arc(ck.x,ck.y,ckR*0.9,0,Math.PI*2);
    wctx.fillStyle=ckc;wctx.fill();
    // Name
    wctx.font='bold 7px Georgia';wctx.textAlign='center';
    wctx.fillStyle='rgba(120,80,0,0.90)';
    wctx.fillText(ck.dna.name||'cakkavatti',ck.x,ck.y+ckR*1.5+8);
  }

  // YEAR / SEASON / CYCLE OVERLAY — top-left corner
  var yr=getYear(),sn=getSeason(),sf=getSeasonFrac();
  var seasonCols=['#6aaa40','#c8b030','#c07028','#6088c0'];
  var seasonLabel=SEASON_NAMES[sn];
  var med=medMult(),lng=longMult();
  // Background pill
  var olW=92,olH=28,olX=8,olY=8;
  wctx.fillStyle='rgba(20,14,8,0.55)';
  wctx.beginPath();wctx.roundRect(olX,olY,olW,olH,5);wctx.fill();
  // Season color bar across top of pill
  wctx.fillStyle=seasonCols[sn]+'99';
  wctx.beginPath();wctx.roundRect(olX,olY,olW,5,3);wctx.fill();
  // Year text
  wctx.font='bold 10px Georgia';wctx.textAlign='left';wctx.textBaseline='middle';
  wctx.fillStyle='rgba(240,220,160,0.95)';
  wctx.fillText('year '+yr,olX+6,olY+14);
  // Season text
  wctx.font='8px Georgia';wctx.fillStyle=seasonCols[sn];
  wctx.fillText(seasonLabel,olX+6,olY+23);
  // Cycle health dot — color encodes combined cycle state
  var cycleHealth=med*lng;
  var dotCol=cycleHealth>1.1?'rgba(100,220,80,0.9)':cycleHealth>0.85?'rgba(220,200,60,0.9)':cycleHealth>0.65?'rgba(220,120,20,0.9)':'rgba(220,40,20,0.9)';
  wctx.beginPath();wctx.arc(olX+olW-10,olY+olH/2,4,0,Math.PI*2);
  wctx.fillStyle=dotCol;wctx.fill();
  // Disease indicator
  if(diseaseActive){
    var dp=diseaseTick/diseaseDuration;
    wctx.font='7px Georgia';wctx.fillStyle='rgba(180,220,100,0.85)';
    wctx.fillText('⚕',olX+olW-22,olY+olH/2+3);
  }

}

function drawGraph(){
  gctx.fillStyle='#faf7f0';gctx.fillRect(0,0,GW,GH);
  if(hist.p.length<2)return;
  var len=hist.p.length,mx=8;
  for(var i=0;i<len;i++){if(hist.p[i]>mx)mx=hist.p[i];if(hist.w[i]>mx)mx=hist.w[i];if(hist.m[i]>mx)mx=hist.m[i];if(hist.f[i]>mx)mx=hist.f[i];}
  var series=[hist.p,hist.w,hist.m,hist.f],gcols=['#c4940c','#c03028','#c07020','#508838'];
  for(var si=0;si<4;si++){gctx.beginPath();for(var i=0;i<len;i++){var x=(i/(hist.max-1))*GW,y=GH-(series[si][i]/mx)*(GH-6)-3;i===0?gctx.moveTo(x,y):gctx.lineTo(x,y);}gctx.strokeStyle=gcols[si];gctx.lineWidth=1.8;gctx.stroke();}
  var ms=8;for(var i=0;i<hist.s.length;i++)if(hist.s[i]>ms)ms=hist.s[i];
  gctx.beginPath();for(var i=0;i<len;i++){var x=(i/(hist.max-1))*GW,y=GH-(hist.s[i]/ms)*(GH-6)*0.45-3;i===0?gctx.moveTo(x,y):gctx.lineTo(x,y);}
  gctx.strokeStyle='rgba(175,55,55,0.5)';gctx.lineWidth=1;gctx.stroke();
}

function updateUI(){
  var p=0,w=0,m=0,f=0,sf=0,dd=0,dn=0,br=0,bn=0,sr=0,hy=0,an=0;
  for(var i=0;i<orgs.length;i++){var o=orgs[i];if(!o.alive||o.isPlant)continue;var c=o.dna.cl;if(c===0)p++;else if(c===1)w++;else if(c===2)m++;else if(c===3)f++;else if(c===CL.BN)bn++;else if(c===CL.AN)an++;if(o.suffering>0.4)sf++;if(isDemigod(o))dd++;if(isDemiNaga(o))dn++;if(isBrahma(o))br++;if(o.sramana)sr++;if(isHybrid(o))hy++;}
  document.getElementById('pC').textContent=p;
  document.getElementById('wC').textContent=w;
  document.getElementById('mC').textContent=m;
  document.getElementById('fC').textContent=f;
  var e=function(id){return document.getElementById(id);};
  if(e('bnCount'))e('bnCount').textContent=bn;
  if(e('brCount'))e('brCount').textContent=br;
  if(e('srCount'))e('srCount').textContent=sr;
  if(e('anCount'))e('anCount').textContent=an;
  if(e('kingName'))e('kingName').textContent=
    (chakkavartinBeing&&chakkavartinBeing.alive)
      ? 'cakkavatti: '+(chakkavartinBeing.dna.name||'?')
      : ['NW','NE','SW','SE'].map(function(n,i){var r=quadRulers[i];return r&&r.alive?n+': '+(r.dna.name||'?'):null;}).filter(Boolean).join(' · ')||'';
  if(e('prayFill'))e('prayFill').style.width=(prayerCharge*100)+'%';
}

    FARM2_X1=Math.floor(COLS*0.08);FARM2_Y1=Math.floor(ROWS*0.75);FARM2_X2=Math.floor(COLS*0.30);FARM2_Y2=Math.floor(ROWS*0.92);
    FARM3_X1=Math.floor(COLS*0.32);FARM3_Y1=Math.floor(ROWS*0.65);FARM3_X2=Math.floor(COLS*0.52);FARM3_Y2=Math.floor(ROWS*0.85);
    FARM4_X1=Math.floor(COLS*0.40);FARM4_Y1=Math.floor(ROWS*0.40);FARM4_X2=Math.floor(COLS*0.60);FARM4_Y2=Math.floor(ROWS*0.58);
    FARM5_X1=Math.floor(COLS*0.62);FARM5_Y1=Math.floor(ROWS*0.55);FARM5_X2=Math.floor(COLS*0.82);FARM5_Y2=Math.floor(ROWS*0.75);

    LIFE_POOL={x:Math.floor(W*0.50),y:Math.floor(H*0.12),r:7,level:1.0};
    ALTAR_X=Math.floor(W*0.18);ALTAR_Y=Math.floor(H*0.55);
    ALTAR2_X=Math.floor(W*0.80);ALTAR2_Y=Math.floor(H*0.55);
    TEMPLES=[{x:Math.floor(W*0.18),y:Math.floor(H*0.20)},{x:Math.floor(W*0.80),y:Math.floor(H*0.20)},{x:Math.floor(W*0.18),y:Math.floor(H*0.82)},{x:Math.floor(W*0.80),y:Math.floor(H*0.82)}];
    FARM_X1=Math.floor(COLS*0.05);FARM_Y1=Math.floor(ROWS*0.30);FARM_X2=Math.floor(COLS*0.22);FARM_Y2=Math.floor(ROWS*0.55);
    FARM2_X1=Math.floor(COLS*0.72);FARM2_Y1=Math.floor(ROWS*0.30);FARM2_X2=Math.floor(COLS*0.92);FARM2_Y2=Math.floor(ROWS*0.55);
    FARM3_X1=Math.floor(COLS*0.05);FARM3_Y1=Math.floor(ROWS*0.62);FARM3_X2=Math.floor(COLS*0.22);FARM3_Y2=Math.floor(ROWS*0.88);
    FARM4_X1=Math.floor(COLS*0.72);FARM4_Y1=Math.floor(ROWS*0.62);FARM4_X2=Math.floor(COLS*0.92);FARM4_Y2=Math.floor(ROWS*0.88);
    FARM5_X1=Math.floor(COLS*0.35);FARM5_Y1=Math.floor(ROWS*0.55);FARM5_X2=Math.floor(COLS*0.62);FARM5_Y2=Math.floor(ROWS*0.88);
    PRAYER_ZONE_X=Math.floor(W*0.50);PRAYER_ZONE_Y=Math.floor(H*0.12);

    // Middle third is pure wilderness/animal territory
    // Left and right civilizations develop in total isolation
    LIFE_POOL={x:Math.floor(W*0.50),y:Math.floor(H*0.50),r:8,level:1.0}; // prize in the middle
    ALTAR_X=Math.floor(W*0.14);ALTAR_Y=Math.floor(H*0.50);
    ALTAR2_X=Math.floor(W*0.86);ALTAR2_Y=Math.floor(H*0.50);
    TEMPLES=[
      {x:Math.floor(W*0.10),y:Math.floor(H*0.20)}, // left upper
      {x:Math.floor(W*0.10),y:Math.floor(H*0.80)}, // left lower
      {x:Math.floor(W*0.90),y:Math.floor(H*0.20)}, // right upper

    ];
    // Left kingdom farms
    FARM_X1=Math.floor(COLS*0.04);FARM_Y1=Math.floor(ROWS*0.15);FARM_X2=Math.floor(COLS*0.20);FARM_Y2=Math.floor(ROWS*0.42);
    FARM2_X1=Math.floor(COLS*0.04);FARM2_Y1=Math.floor(ROWS*0.58);FARM2_X2=Math.floor(COLS*0.20);FARM2_Y2=Math.floor(ROWS*0.85);
    // Right kingdom farms
    FARM3_X1=Math.floor(COLS*0.78);FARM3_Y1=Math.floor(ROWS*0.15);FARM3_X2=Math.floor(COLS*0.94);FARM3_Y2=Math.floor(ROWS*0.42);
    FARM4_X1=Math.floor(COLS*0.78);FARM4_Y1=Math.floor(ROWS*0.58);FARM4_X2=Math.floor(COLS*0.94);FARM4_Y2=Math.floor(ROWS*0.85);
    // Middle has no farms — only wild animals
    FARM5_X1=Math.floor(COLS*0.38);FARM5_Y1=Math.floor(ROWS*0.80);FARM5_X2=Math.floor(COLS*0.62);FARM5_Y2=Math.floor(ROWS*0.92);
    PRAYER_ZONE_X=Math.floor(W*0.50);PRAYER_ZONE_Y=Math.floor(H*0.50);
