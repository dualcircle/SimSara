  // Rebuild FARMS array from updated coordinates
  FARMS.length=0;
  FARMS.push(
    {x1:FARM_X1,y1:FARM_Y1,x2:FARM_X2,y2:FARM_Y2,nutrition:2.0},
    {x1:FARM2_X1,y1:FARM2_Y1,x2:FARM2_X2,y2:FARM2_Y2,nutrition:1.0},
    {x1:FARM3_X1,y1:FARM3_Y1,x2:FARM3_X2,y2:FARM3_Y2,nutrition:0.8},
    {x1:FARM4_X1,y1:FARM4_Y1,x2:FARM4_X2,y2:FARM4_Y2,nutrition:0.8},
    {x1:FARM5_X1,y1:FARM5_Y1,x2:FARM5_X2,y2:FARM5_Y2,nutrition:3.5}
  );
  TEMPLES[0]&&(TEMPLE_X=TEMPLES[0].x,TEMPLE_Y=TEMPLES[0].y);
}

var skipTerrainInit=false; // set true by generateMap to avoid double-init

function generateMap(){
  // ================================================================
  // ORGANIC MAP GENERATOR v2
  // Rock topology: cellular automata seeded with Perlin-like noise
  //   — produces genuine caves, ridges, corridors, not random blobs
  // Pond placement: Fibonacci golden-angle spiral
  //   — mathematically guarantees non-clustering distribution
  // Life pool: placed opposite the sacred source — creates a journey
  // Farms: scan for largest open clearings near water
  // ================================================================

  // --- 0. DETERMINISTIC SEED for this run ---
  var sx=Math.random()*1000,sy=Math.random()*1000;
  function hash(x,y){
    var n=Math.sin(x*127.1+y*311.7+sx)*43758.5453+Math.cos(y*269.5+x*183.3+sy)*22578.1;
    return n-Math.floor(n);
  }
  // Smooth noise — bilinear interpolation of hash grid
  function smoothNoise(x,y){
    var ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
    var u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy); // smoothstep
    return hash(ix,iy)*(1-u)*(1-v)+hash(ix+1,iy)*u*(1-v)+
           hash(ix,iy+1)*(1-u)*v+hash(ix+1,iy+1)*u*v;
  }
  // Fractal noise — 4 octaves, lacunarity 2, persistence 0.5
  function fractalNoise(x,y){
    var v=0,amp=1,freq=1,max=0;
    for(var o=0;o<4;o++){v+=smoothNoise(x*freq,y*freq)*amp;max+=amp;amp*=0.5;freq*=2;}
    return v/max;
  }

  // --- 1. SEED WALLS from fractal noise, center-weighted ---
  walls.fill(0);
  var noiseScale=rnd(3.0,6.0);
  var wallThreshBase=rnd(0.02,0.07); // ~95%+ of center cells seed as wall
  for(var cy=1;cy<ROWS-1;cy++)for(var cx=1;cx<COLS-1;cx++){
    var edgeX=Math.abs(cx/COLS-0.5)*2;
    var edgeY=Math.abs(cy/ROWS-0.5)*2;
    var edgeDist=Math.max(edgeX,edgeY);
    // Clear zone starts at 30% from center (was 50%), fully clear by 80% (was 75%)
    // This keeps rocks well away from all edges
    var edgeFade=edgeDist<0.30?0:edgeDist<0.65?((edgeDist-0.30)/0.35)*0.55:0.55+((edgeDist-0.65)/0.35)*0.45;
    var thresh=wallThreshBase+edgeFade;
    var n=fractalNoise(cx/COLS*noiseScale,cy/ROWS*noiseScale);
    if(n>thresh)walls[cy*COLS+cx]=1;
  }

  // --- 2. CELLULAR AUTOMATA — 2 passes only, minimal erosion ---
  for(var pass=0;pass<2;pass++){
    var next=new Uint8Array(NCELLS);
    for(var cy=1;cy<ROWS-1;cy++)for(var cx=1;cx<COLS-1;cx++){
      var n=0;
      for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
        if(walls[(cy+dy)*COLS+(cx+dx)])n++;
      }
      var isWall=walls[cy*COLS+cx];
      // Wall survives with just 2 neighbors — very sticky
      // Open fills only when completely surrounded (7+)
      next[cy*COLS+cx]=(isWall?(n>=2?1:0):(n>=7?1:0));
    }
    walls.set(next);
  }
  // Remove only completely isolated orphan pixels
  for(var cy=1;cy<ROWS-1;cy++)for(var cx=1;cx<COLS-1;cx++){
    var n=0;
    for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
      if(walls[(cy+dy)*COLS+(cx+dx)])n++;
    }
    if(walls[cy*COLS+cx]&&n<=1)walls[cy*COLS+cx]=0;
  }

  // --- 2b. FLOOD FILL — eliminate enclosed rooms ---
  // Seed from ALL edge cells, then flood through open space.
  // Any open cell not reachable from an edge = enclosed room → wall.
  var reached=new Uint8Array(NCELLS);
  var queue=[];
  for(var px=0;px<COLS;px++){
    var i0=0*COLS+px, i1=(ROWS-1)*COLS+px;
    if(!walls[i0]&&!reached[i0]){reached[i0]=1;queue.push(i0);}
    if(!walls[i1]&&!reached[i1]){reached[i1]=1;queue.push(i1);}
  }
  for(var py=0;py<ROWS;py++){
    var i0=py*COLS+0, i1=py*COLS+COLS-1;
    if(!walls[i0]&&!reached[i0]){reached[i0]=1;queue.push(i0);}
    if(!walls[i1]&&!reached[i1]){reached[i1]=1;queue.push(i1);}
  }
  // BFS
  var qi=0;
  while(qi<queue.length){
    var idx=queue[qi++];
    var qcx=idx%COLS,qcy=Math.floor(idx/COLS);
    var nbrs=[[0,-1],[0,1],[-1,0],[1,0]];
    for(var ni=0;ni<4;ni++){
      var nx=qcx+nbrs[ni][0],ny=qcy+nbrs[ni][1];
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      var nidx=ny*COLS+nx;
      if(!walls[nidx]&&!reached[nidx]){reached[nidx]=1;queue.push(nidx);}
    }
  }
  // Any open cell not reached = enclosed room → fill with wall
  for(var i=0;i<NCELLS;i++){
    if(!walls[i]&&!reached[i])walls[i]=1;
  }

  // ================================================================
  // PASS A — REMOTENESS MAP
  // Dijkstra distance from all open edge cells inward.
  // Every open cell scored 0 (edge) → 1 (most remote).
  // This single map drives nutrition, water purity, fertility,
  // animal territory, life pool placement — everything.
  // ================================================================
  remoteness.fill(0);
  var remDist=new Int32Array(NCELLS).fill(-1);
  var remQ=[];
  for(var px=0;px<COLS;px++){
    var i0=0*COLS+px,i1=(ROWS-1)*COLS+px;
    if(!walls[i0]&&remDist[i0]<0){remDist[i0]=0;remQ.push(i0);}
    if(!walls[i1]&&remDist[i1]<0){remDist[i1]=0;remQ.push(i1);}
  }
  for(var py=0;py<ROWS;py++){
    var i0=py*COLS,i1=py*COLS+COLS-1;
    if(!walls[i0]&&remDist[i0]<0){remDist[i0]=0;remQ.push(i0);}
    if(!walls[i1]&&remDist[i1]<0){remDist[i1]=0;remQ.push(i1);}
  }
  var rqi=0,maxDist=0;
  while(rqi<remQ.length){
    var idx=remQ[rqi++];
    var rcx=idx%COLS,rcy=Math.floor(idx/COLS);
    var rNbrs=[[-1,0],[1,0],[0,-1],[0,1]];
    for(var ni=0;ni<4;ni++){
      var rnx=rcx+rNbrs[ni][0],rny=rcy+rNbrs[ni][1];
      if(rnx<0||rnx>=COLS||rny<0||rny>=ROWS)continue;
      var ridx=rny*COLS+rnx;
      if(!walls[ridx]&&remDist[ridx]<0){
        remDist[ridx]=remDist[idx]+1;
        if(remDist[ridx]>maxDist)maxDist=remDist[ridx];
        remQ.push(ridx);
      }
    }
  }
  // Normalize to 0-1
  for(var i=0;i<NCELLS;i++){
    remoteness[i]=(maxDist>0&&remDist[i]>=0)?(remDist[i]/maxDist):0;
  }

  // ================================================================
  // PASS B — ROCK DEPTH (height shading)
  // Count wall neighbors for each wall cell.
  // 0-1 neighbors = cliff edge (light), 7-8 = deep interior (dark)
  // ================================================================
  rockDepth.fill(0);
  for(var i=0;i<NCELLS;i++){
    if(!walls[i])continue;
    var rcx2=i%COLS,rcy2=Math.floor(i/COLS);
    var n=0;
    for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
      if(dx===0&&dy===0)continue;
      var nx=rcx2+dx,ny=rcy2+dy;
      if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&walls[ny*COLS+nx])n++;
    }
    rockDepth[i]=n; // 0-8
  }

  // ================================================================
  // PASS C — CONNECTED COMPONENTS (chamber analysis)
  // Find all open connected regions, rank by size and remoteness.
  // Used for: lake candidate, fertility zones, tree placement.
  // ================================================================
  var compId=new Int32Array(NCELLS).fill(-1);
  var compSizes=[],compRemote=[],compLabel=0;
  for(var i=0;i<NCELLS;i++){
    if(walls[i]||compId[i]>=0)continue;
    // BFS from this cell
    var cQ=[i],cQi=0,cSize=0,cRemSum=0;
    compId[i]=compLabel;
    while(cQi<cQ.length){
      var cidx=cQ[cQi++];
      cSize++;cRemSum+=remoteness[cidx];
      var ccx=cidx%COLS,ccy=Math.floor(cidx/COLS);
      var cNbrs=[[-1,0],[1,0],[0,-1],[0,1]];
      for(var ni=0;ni<4;ni++){
        var cnx=ccx+cNbrs[ni][0],cny=ccy+cNbrs[ni][1];
        if(cnx<0||cnx>=COLS||cny<0||cny>=ROWS)continue;
        var cnidx=cny*COLS+cnx;
        if(!walls[cnidx]&&compId[cnidx]<0){compId[cnidx]=compLabel;cQ.push(cnidx);}
      }
    }
    compSizes.push(cSize);
    compRemote.push(cSize>0?cRemSum/cSize:0);
    compLabel++;
  }
  // Sort component indices by size descending
  var compOrder=[];for(var c=0;c<compSizes.length;c++)compOrder.push(c);
  compOrder.sort(function(a,b){return compSizes[b]-compSizes[a];});

  // ================================================================
  // PASS D — LAKE (probabilistic, ~40% chance)
  // Lake = second or third largest chamber if it has high avg remoteness
  // and size > 30 cells. Rendered as water, edge cells get fish food.
  // ================================================================
  lakeCells.fill(0);
  LAKE_EXISTS=false;
  // LAKE — try components 1-7 for one with >= 80 cells
  for(var lci=1;lci<Math.min(compOrder.length,8)&&!LAKE_EXISTS;lci++){
    var lakeLabel=compOrder[lci];
    if(compSizes[lakeLabel]>=80){
      for(var i=0;i<NCELLS;i++){if(compId[i]===lakeLabel)lakeCells[i]=1;}
      LAKE_EXISTS=true;
    }
  }
  // If no component big enough, carve one manually in a remote area
  if(!LAKE_EXISTS){
    var lakeSeedIdx=-1,lsBestRem=0;
    for(var attempt=0;attempt<400;attempt++){
      var ti=Math.floor(Math.random()*NCELLS);
      if(walls[ti])continue;
      if(remoteness[ti]>0.28&&remoteness[ti]>lsBestRem){lsBestRem=remoteness[ti];lakeSeedIdx=ti;}
    }
    if(lakeSeedIdx>=0){
      var lscx=lakeSeedIdx%COLS,lscy=Math.floor(lakeSeedIdx/COLS);
      var lakeR=Math.floor(rnd(4,7));
      for(var dy=-lakeR;dy<=lakeR;dy++)for(var dx=-lakeR;dx<=lakeR;dx++){
        if(dx*dx+dy*dy>lakeR*lakeR)continue;
        var nx=lscx+dx,ny=lscy+dy;
        if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1)continue;
        walls[ny*COLS+nx]=0;
        lakeCells[ny*COLS+nx]=1;
      }
      LAKE_EXISTS=true;
    }
  }

  // SUPER-PURE WATER SOURCES — 1-2 per map, large radius, purity 0.92+
  var numSuperPure=1+(Math.random()<0.40?1:0);
  for(var spi=0;spi<numSuperPure;spi++){
    var spBestRem=-1,spBestIdx=-1;
    for(var i=0;i<NCELLS;i++){
      if(walls[i]||lakeCells[i])continue;
      var farEnough=true;
      for(var pj=0;pj<PONDS.length;pj++){
        if(PONDS[pj].purity>=0.88){
          var ddx=(i%COLS+0.5)*CELL-PONDS[pj].x,ddy2=(Math.floor(i/COLS)+0.5)*CELL-PONDS[pj].y;
          if(ddx*ddx+ddy2*ddy2<(CELL*14)*(CELL*14)){farEnough=false;break;}
        }
      }
      if(!farEnough)continue;
      if(remoteness[i]>0.38&&remoteness[i]>spBestRem){spBestRem=remoteness[i];spBestIdx=i;}
    }
    if(spBestIdx>=0){
      var spcx=spBestIdx%COLS,spcy=Math.floor(spBestIdx/COLS);
      for(var dy=-3;dy<=3;dy++)for(var dx=-3;dx<=3;dx++){
        var nx=spcx+dx,ny=spcy+dy;
        if(nx>=1&&nx<COLS-1&&ny>=1&&ny<ROWS-1)walls[ny*COLS+nx]=0;
      }
      PONDS.push({x:(spcx+0.5)*CELL,y:(spcy+0.5)*CELL,
        r:15+Math.floor(Math.random()*8),purity:0.92+Math.random()*0.06,
        level:1.0,cap:0.96,regen:0.0004});
    }
  }

  // ================================================================
  // PASS E — ROCK PATHS (1-cell narrow, max 2 per map)
  // Snakes through the thickest rock mass connecting two open cells.
  // Uses a biased random walk that prefers wall cells.
  // Stored in pathCells — rendered differently, energy cost in step.
  // ================================================================
  pathCells.fill(0);
  var numPaths=Math.random()<0.5?1:2;
  for(var pn=0;pn<numPaths;pn++){
    // Pick two open cells on opposite sides of a rock mass
    // Start: random open cell with high wall-neighbor count (cliff edge)
    var startIdx=-1,endIdx=-1,bestWall=0;
    for(var attempt=0;attempt<200;attempt++){
      var ti=Math.floor(Math.random()*NCELLS);
      if(walls[ti]||lakeCells[ti])continue;
      var tcx=ti%COLS,tcy=Math.floor(ti/COLS);
      var wallAdj=0;
      for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
        var nx=tcx+dx,ny=tcy+dy;
        if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&walls[ny*COLS+nx])wallAdj++;
      }
      if(wallAdj>bestWall&&remoteness[ti]>0.15){bestWall=wallAdj;startIdx=ti;}
    }
    if(startIdx<0)continue;
    // End: open cell far from start and on other side of rocks
    var scx=startIdx%COLS,scy=Math.floor(startIdx/COLS);
    var ecx=clamp(COLS-1-scx+Math.floor(rnd(-4,4)),1,COLS-2);
    var ecy=clamp(ROWS-1-scy+Math.floor(rnd(-4,4)),1,ROWS-2);
    // Find nearest open cell to target
    for(var er=0;er<=8;er++){
      var found=false;
      for(var edy=-er;edy<=er&&!found;edy++)for(var edx=-er;edx<=er&&!found;edx++){
        if(Math.abs(edx)!==er&&Math.abs(edy)!==er)continue;
        var enx=clamp(ecx+edx,1,COLS-2),eny=clamp(ecy+edy,1,ROWS-2);
        if(!walls[eny*COLS+enx]&&eny*COLS+enx!==startIdx){endIdx=eny*COLS+enx;found=true;}
      }
      if(found)break;
    }
    if(endIdx<0)continue;
    // Walk from start toward end, preferring to stay IN walls (the path carves through rock)
    var cur=startIdx;
    var maxSteps=COLS*2;
    for(var step2=0;step2<maxSteps&&cur!==endIdx;step2++){
      pathCells[cur]=1;
      var pcx=cur%COLS,pcy=Math.floor(cur/COLS);
      var tdx=(endIdx%COLS)-pcx,tdy=(Math.floor(endIdx/COLS))-pcy;
      var tlen=Math.sqrt(tdx*tdx+tdy*tdy)||1;
      // Try to step toward end; add small random wobble
      var mx=Math.round(tdx/tlen+(Math.random()-0.5)*0.8);
      var my=Math.round(tdy/tlen+(Math.random()-0.5)*0.8);
      mx=clamp(mx,-1,1);my=clamp(my,-1,1);
      if(mx===0&&my===0)mx=1;
      var nx=clamp(pcx+mx,1,COLS-2),ny=clamp(pcy+my,1,ROWS-2);
      // Carve path — mark as open AND path
      walls[ny*COLS+nx]=0;
      cur=ny*COLS+nx;
    }
    pathCells[endIdx]=1;
  }

  // ================================================================
  // PASS F — CANALS (trace existing open cells, no carving)
  // ================================================================
  CANALS=[];
  var cPts=[];
  for(var s=0;s<Math.max(COLS,ROWS)*2;s++){
    var t=s/(Math.max(COLS,ROWS)*2);
    var cpx=Math.floor(t*COLS),cpy=Math.floor(t*ROWS);
    if(cpx>=0&&cpx<COLS&&cpy>=0&&cpy<ROWS&&!walls[cpy*COLS+cpx]&&!lakeCells[cpy*COLS+cpx]){
      if(s%3===0)cPts.push({x:cpx*CELL+CELL/2,y:cpy*CELL+CELL/2});
    }
  }
  if(cPts.length>2)CANALS.push({pts:cPts,purity:0.80+Math.random()*0.12,width:2});

  // ================================================================
  // PASS G — PONDS (Fibonacci spiral, purity from remoteness)
  // ================================================================
  PONDS=[];
  var GOLDEN_ANGLE=Math.PI*(3-Math.sqrt(5));
  var spiralCX=W*rnd(0.35,0.65),spiralCY=H*rnd(0.35,0.65);
  var spiralScale=Math.min(W,H)*rnd(0.24,0.34); // smaller scale keeps ponds central
  var numPonds=8+Math.floor(Math.random()*6);
  for(var pi=0;pi<numPonds;pi++){
    var angle=pi*GOLDEN_ANGLE;
    var radius=spiralScale*Math.sqrt((pi+1)/numPonds);
    var px=clamp(spiralCX+Math.cos(angle)*radius,W*0.15,W*0.85);
    var py=clamp(spiralCY+Math.sin(angle)*radius,H*0.15,H*0.85);
    var pcx=Math.floor(px/CELL),pcy=Math.floor(py/CELL);
    var placed=false;
    for(var er=0;er<=8&&!placed;er++){
      for(var edy=-er;edy<=er&&!placed;edy++)for(var edx=-er;edx<=er&&!placed;edx++){
        if(Math.abs(edx)!==er&&Math.abs(edy)!==er)continue;
        var enx=clamp(pcx+edx,2,COLS-3),eny=clamp(pcy+edy,2,ROWS-3);
        if(!walls[eny*COLS+enx]&&!lakeCells[eny*COLS+enx]){
          // Purity derived from remoteness of this cell
          var cellRem=remoteness[eny*COLS+enx];
          var pur=pi===0?1.0:clamp(0.28+cellRem*0.65+rnd(0,0.12),0.28,0.95);
          var pr=pi===0?(20+Math.floor(Math.random()*8)):(4+Math.floor(Math.random()*6));
          // Clear a small opening
          for(var cdy=-1;cdy<=1;cdy++)for(var cdx=-1;cdx<=1;cdx++){
            var nx=enx+cdx,ny2=eny+cdy;
            if(nx>=1&&nx<COLS-1&&ny2>=1&&ny2<ROWS-1)walls[ny2*COLS+nx]=0;
          }
          PONDS.push({x:(enx+0.5)*CELL,y:(eny+0.5)*CELL,r:pr,purity:pur,
            level:1.0,cap:pi===0?0.95:pur*0.98,regen:pi===0?0.0006:rnd(0.00012,0.00025)});
          placed=true;
        }
      }
    }
  }

  // ================================================================
  // PASS H — LIFE POOL (most remote open cell)
  // ================================================================
  var lpBestRem=-1,lpBestIdx=0;
  for(var i=0;i<NCELLS;i++){
    if(!walls[i]&&!lakeCells[i]&&remoteness[i]>lpBestRem){
      lpBestRem=remoteness[i];lpBestIdx=i;
    }
  }
  var lpCX=lpBestIdx%COLS,lpCY=Math.floor(lpBestIdx/COLS);
  for(var dy=-2;dy<=2;dy++)for(var dx=-2;dx<=2;dx++){
    var nx=lpCX+dx,ny=lpCY+dy;
    if(nx>=1&&nx<COLS-1&&ny>=1&&ny<ROWS-1)walls[ny*COLS+nx]=0;
  }
  LIFE_POOL={x:(lpCX+0.5)*CELL,y:(lpCY+0.5)*CELL,r:7,level:1.0};

  // Elephant home — second most remote, MUST be in different quadrant from life pool
  // Quadrants: 0=NW, 1=NE, 2=SW, 3=SE
  var lpQ=(lpCX>COLS/2?1:0)+(lpCY>ROWS/2?2:0);
  // Pick one of the other 3 quadrants randomly
  var otherQuads=[];
  for(var q=0;q<4;q++)if(q!==lpQ)otherQuads.push(q);
  var ehQ=otherQuads[Math.floor(Math.random()*otherQuads.length)];
  var ehX1=(ehQ%2===0)?0:COLS/2, ehX2=(ehQ%2===0)?COLS/2:COLS;
  var ehY1=(ehQ<2)?0:ROWS/2,    ehY2=(ehQ<2)?ROWS/2:ROWS;
  var ehBestRem=-1,ehBestIdx=-1;
  for(var i=0;i<NCELLS;i++){
    if(walls[i]||lakeCells[i])continue;
    var ecx2=i%COLS,ecy2=Math.floor(i/COLS);
    if(ecx2<ehX1||ecx2>=ehX2||ecy2<ehY1||ecy2>=ehY2)continue;
    if(remoteness[i]>ehBestRem){ehBestRem=remoteness[i];ehBestIdx=i;}
  }
  if(ehBestIdx<0){ehBestIdx=lpBestIdx;} // fallback
  ELEPHANT_HOME_X=(ehBestIdx%COLS+0.5)*CELL;
  ELEPHANT_HOME_Y=(Math.floor(ehBestIdx/COLS)+0.5)*CELL;

  // ================================================================
  // PASS I — FERTILITY ZONES (two largest open chambers by area)
  // ================================================================
  var fertComp1=compOrder[0],fertComp2=compOrder[Math.min(1,compOrder.length-1)];
  // Find centroid of each
  function compCentroid(label){
    var sx=0,sy=0,n=0;
    for(var i=0;i<NCELLS;i++){
      if(compId[i]===label&&!lakeCells[i]){
        sx+=i%COLS;sy+=Math.floor(i/COLS);n++;
      }
    }
    return n>0?{x:(sx/n+0.5)*CELL,y:(sy/n+0.5)*CELL}:{x:W*0.5,y:H*0.5};
  }
  var fc1=compCentroid(fertComp1),fc2=compCentroid(fertComp2);
  FERT_X=Math.floor(fc1.x);FERT_Y=Math.floor(fc1.y);FERT_R=70;
  FERT_X2=Math.floor(fc2.x);FERT_Y2=Math.floor(fc2.y);FERT_R2=55;

  // ================================================================
  // PASS J — FARMS (low remoteness, large open areas)
  // ================================================================
  FARMS.length=0;
  var farmBiases=[
    {bx:rnd(0.04,0.18),by:rnd(0.45,0.65)},
    {bx:rnd(0.62,0.85),by:rnd(0.55,0.80)},
    {bx:rnd(0.05,0.18),by:rnd(0.08,0.22)},
    {bx:rnd(0.65,0.88),by:rnd(0.05,0.20)},
    {bx:rnd(0.30,0.60),by:rnd(0.68,0.90)},
  ];
  for(var fi=0;fi<farmBiases.length;fi++){
    var fb=farmBiases[fi];
    var fcx2=Math.floor(COLS*fb.bx),fcy2=Math.floor(ROWS*fb.by);
    var fw=4+Math.floor(Math.random()*4),fh=3+Math.floor(Math.random()*4);
    var bestScore=-1,bfx=fcx2,bfy=fcy2;
    for(var sy2=-6;sy2<=6;sy2++)for(var sx2=-6;sx2<=6;sx2++){
      var tx=clamp(fcx2+sx2,2,COLS-fw-2),ty=clamp(fcy2+sy2,2,ROWS-fh-2);
      var openC=0,remSum=0;
      for(var fdy=0;fdy<fh;fdy++)for(var fdx=0;fdx<fw;fdx++){
        var fi2=( ty+fdy)*COLS+(tx+fdx);
        if(!walls[fi2]&&!lakeCells[fi2]){openC++;remSum+=remoteness[fi2];}
      }
      var avgRem=openC>0?remSum/openC:1;
      var overlap=0;
      for(var efi=0;efi<FARMS.length;efi++){
        var ef=FARMS[efi];
        if(tx<ef.x2+3&&tx+fw>ef.x1-3&&ty<ef.y2+3&&ty+fh>ef.y1-3)overlap=fw*fh;
      }
      // Prefer open, low-remoteness land (accessible farmland)
      var score=openC*(1-avgRem*0.6)-overlap*2;
      if(score>bestScore){bestScore=score;bfx=tx;bfy=ty;}
    }
    var fx1=clamp(bfx,2,COLS-fw-2),fy1=clamp(bfy,2,ROWS-fh-2);
    var fx2=fx1+fw,fy2=fy1+fh;
    // Nutrition inversely proportional to remoteness — accessible farms are modest
    // Remote farms (hard to reach) are extraordinarily rich
    var farmRem=remoteness[fy1*COLS+fx1];
    var farmNut=1.0+farmRem*3.5+Math.random()*0.5;
    for(var fdy=fy1-1;fdy<=fy2+1;fdy++)for(var fdx=fx1-1;fdx<=fx2+1;fdx++){
      if(fdx>=0&&fdx<COLS&&fdy>=0&&fdy<ROWS)walls[fdy*COLS+fdx]=0;
    }
    FARMS.push({x1:fx1,y1:fy1,x2:fx2,y2:fy2,nutrition:farmNut});
  }

  // ================================================================
  // PASS K — TREES (patches only, remote areas only)
  // Pick 4-7 patch centers in high-remoteness open cells.
  // Each patch radiates 4-12 trees within a radius.
  // Three variants by context: forest (deep), willow (waterside), scrub (transition)
  // ================================================================
  treeCells=[];
  var numPatches=4+Math.floor(Math.random()*4);
  var patchAttempts=0;
  var patches=[];
  while(patches.length<numPatches&&patchAttempts<400){
    patchAttempts++;
    var ti=Math.floor(Math.random()*NCELLS);
    if(walls[ti]||lakeCells[ti])continue;
    var rem=remoteness[ti];
    if(rem<0.35)continue; // only genuinely remote areas
    if(inFarmPlot(ti%COLS,Math.floor(ti/COLS)))continue;
    // Not too close to another patch center
    var tooClose=false;
    for(var pj=0;pj<patches.length;pj++){
      var pdx=(ti%COLS-patches[pj].cx)*CELL,pdy=(Math.floor(ti/COLS)-patches[pj].cy)*CELL;
      if(pdx*pdx+pdy*pdy<(CELL*8)*(CELL*8)){tooClose=true;break;}
    }
    if(tooClose)continue;
    // Check if near water for willow
    var nearWater=false;
    for(var pi=0;pi<PONDS.length&&!nearWater;pi++){
      var pdx2=(ti%COLS+0.5)*CELL-PONDS[pi].x,pdy2=(Math.floor(ti/COLS)+0.5)*CELL-PONDS[pi].y;
      if(pdx2*pdx2+pdy2*pdy2<(PONDS[pi].r+CELL*4)*(PONDS[pi].r+CELL*4))nearWater=true;
    }
    var variant=nearWater?'willow':rem>0.60?'forest':'scrub';
    var patchR=CELL*(3+Math.floor(Math.random()*4)); // 3-6 cell radius
    var patchCount=5+Math.floor(Math.random()*8);
    patches.push({cx:ti%COLS,cy:Math.floor(ti/COLS),r:patchR,count:patchCount,variant:variant});
  }
  // Place trees within each patch
  for(var pi=0;pi<patches.length;pi++){
    var p=patches[pi];
    var placed=0,pAttempts=0;
    while(placed<p.count&&pAttempts<80){
      pAttempts++;
      var angle=Math.random()*Math.PI*2;
      var dist=Math.random()*p.r;
      var tx=p.cx+Math.round(Math.cos(angle)*dist/CELL);
      var ty=p.cy+Math.round(Math.sin(angle)*dist/CELL);
      if(tx<0||tx>=COLS||ty<0||ty>=ROWS)continue;
      var tidx=ty*COLS+tx;
      if(walls[tidx]||lakeCells[tidx])continue;
      if(inFarmPlot(tx,ty))continue;
      if(remoteness[tidx]<0.25)continue;
      // Not too close to another tree
      var tooCloseT=false;
      for(var tj=0;tj<treeCells.length;tj++){
        var dtx=treeCells[tj].x-(tx+0.5)*CELL,dty=treeCells[tj].y-(ty+0.5)*CELL;
        if(dtx*dtx+dty*dty<CELL*CELL*2.2){tooCloseT=true;break;}
      }
      if(tooCloseT)continue;
      var tr=CELL*(p.variant==='forest'?0.82:p.variant==='willow'?0.70:0.55);
      treeCells.push({x:(tx+0.5)*CELL,y:(ty+0.5)*CELL,r:tr,variant:p.variant,rem:remoteness[tidx]});
      placed++;
    }
  }

  // ================================================================
  // PASS L — ALTARS, TEMPLES at open spots
  // ================================================================
  function findOpenSpot(biasx,biasy,spread){
    var rx=Math.floor(COLS*biasx),ry=Math.floor(ROWS*biasy);
    var x1=clamp(Math.floor(COLS*(biasx-spread)),1,COLS-2);
    var x2=clamp(Math.floor(COLS*(biasx+spread)),1,COLS-2);
    var y1=clamp(Math.floor(ROWS*(biasy-spread)),1,ROWS-2);
    var y2=clamp(Math.floor(ROWS*(biasy+spread)),1,ROWS-2);
    for(var edy=y1;edy<=y2;edy++)for(var edx=x1;edx<=x2;edx++){
      if(!walls[edy*COLS+edx]&&!lakeCells[edy*COLS+edx]){rx=edx;ry=edy;break;}
    }
    for(var dy=-2;dy<=2;dy++)for(var dx=-2;dx<=2;dx++){
      var nx=rx+dx,ny=ry+dy;
      if(nx>=1&&nx<COLS-1&&ny>=1&&ny<ROWS-1)walls[ny*COLS+nx]=0;
    }
    return{x:(rx+0.5)*CELL,y:(ry+0.5)*CELL};
  }
  // Altars and temples — random positions across the map, found via terrain scan
  // Pick 6 random bias points spread across the map, find open spots near them
  var quadBiases=[
    {bx:rnd(0.08,0.38),by:rnd(0.08,0.42)},  // NW zone
    {bx:rnd(0.55,0.88),by:rnd(0.08,0.42)},  // NE zone
    {bx:rnd(0.08,0.38),by:rnd(0.55,0.88)},  // SW zone
    {bx:rnd(0.55,0.88),by:rnd(0.55,0.88)},  // SE zone
    {bx:rnd(0.20,0.55),by:rnd(0.35,0.65)},  // center-west
    {bx:rnd(0.45,0.80),by:rnd(0.35,0.65)},  // center-east
  ];
  // Shuffle so altar1 and altar2 are unpredictable
  for(var si=quadBiases.length-1;si>0;si--){
    var sj=Math.floor(Math.random()*(si+1));
    var tmp=quadBiases[si];quadBiases[si]=quadBiases[sj];quadBiases[sj]=tmp;
  }
  var a1=findOpenSpot(quadBiases[0].bx,quadBiases[0].by,0.16);
  ALTAR_X=Math.floor(a1.x);ALTAR_Y=Math.floor(a1.y);
  var a2=findOpenSpot(quadBiases[1].bx,quadBiases[1].by,0.16);
  ALTAR2_X=Math.floor(a2.x);ALTAR2_Y=Math.floor(a2.y);
  PRAYER_ZONE_X=ALTAR_X;PRAYER_ZONE_Y=ALTAR_Y;
  var t1=findOpenSpot(quadBiases[2].bx,quadBiases[2].by,0.12);
  var t2=findOpenSpot(quadBiases[3].bx,quadBiases[3].by,0.12);
  var t3=findOpenSpot(quadBiases[4].bx,quadBiases[4].by,0.12);
  var t4=findOpenSpot(quadBiases[5].bx,quadBiases[5].by,0.12);
  TEMPLES=[t1,t2,t3,t4];TEMPLE_X=Math.floor(t1.x);TEMPLE_Y=Math.floor(t1.y);

  // ================================================================
  // PASS M — BANDIT DEN & STOREHOUSE CLEARINGS
  // ================================================================
  var shPos=[
    {x:0.18,y:0.45},{x:0.55,y:0.18},{x:0.08,y:0.75},{x:0.82,y:0.80},
    {x:0.30,y:0.07},{x:0.50,y:0.06},{x:0.68,y:0.07},{x:0.86,y:0.12}
  ];
  for(var si=0;si<shPos.length;si++){
    var scx=Math.floor(COLS*shPos[si].x),scy=Math.floor(ROWS*shPos[si].y);
    for(var dy=-3;dy<=3;dy++)for(var dx=-3;dx<=3;dx++){
      var nx=scx+dx,ny=scy+dy;
      if(nx>=1&&nx<COLS-1&&ny>=1&&ny<ROWS-1)walls[ny*COLS+nx]=0;
    }
  }
  BANDIT_DEN_X=0;BANDIT_DEN_Y=0;
  var denBest=-1;
  for(var dy=-12;dy<=12;dy++)for(var dx=-12;dx<=12;dx++){
    var wx2=Math.floor(COLS/2)+dx,wy2=Math.floor(ROWS/2)+dy;
    if(wx2<1||wx2>=COLS-1||wy2<1||wy2>=ROWS-1)continue;
    if(walls[wy2*COLS+wx2])continue;
    var adj=0;
    if(walls[wy2*COLS+wx2-1])adj++;if(walls[wy2*COLS+wx2+1])adj++;
    if(walls[(wy2-1)*COLS+wx2])adj++;if(walls[(wy2+1)*COLS+wx2])adj++;
    if(adj>denBest){denBest=adj;BANDIT_DEN_X=(wx2+0.5)*CELL;BANDIT_DEN_Y=(wy2+0.5)*CELL;}
  }

  // Update button
  var mapNames=['verdant cave system','sunken river maze','fractured highlands','eroded plateau','ancient karst','broken delta'];
  document.getElementById('newMapBtn').textContent='generated: '+mapNames[Math.floor(Math.random()*mapNames.length)]+' — generate again';

  paused=false;
  var pb2=document.getElementById('pauseBtn');if(pb2)pb2.textContent='pause';

  skipTerrainInit=true;
  init();
  skipTerrainInit=false;
  wallDirty=true; // force wall rebake on next draw
}

function init(){
  // Reset pond farms so they don't accumulate on reset
  FARMS.length=5;
  buildPondFarms();
  initGrid();initStorehouses();if(!skipTerrainInit)initWalls();
  buildCanalFarms();
  orgs=[];bardo=[];flashes=[];hist.p=[];hist.w=[];hist.m=[];hist.f=[];hist.s=[];
  tick=0;totalRebirths=0;totalEvents=0;lastEvTick=-600;activeEv=null;
  deva=null;naga=null;prayerCharge=0;migrationQueue=[];
  chakkavartinBeing=null;hadMultipleKings=false;chakkavartinTick=-1;kingKilledKing=false;lastChakkavartinDeathTick=-9999;
  banditLastSeen=0;nextBanditSwarm=700;denFood=0;dormancyAlertTick=null;
  lastNagaTick=-NAGA_INTERVAL;nextNagaIn=NAGA_INTERVAL+Math.floor(Math.random()*NAGA_SPREAD);
  var eb=document.getElementById('evBanner');if(eb){eb.textContent='the wheel turns';eb.style.color='#c0a060';}
  var pf=document.getElementById('prayFill');if(pf)pf.style.width='0%';

  // Seed a few plants only — world is otherwise empty
  for(var i=0;i<30;i++){var x=Math.random()*W,y=Math.random()*H;var ci=Math.floor(y/CELL)*COLS+Math.floor(x/CELL);if(ci>=0&&ci<NCELLS&&!walls[ci])orgs.push(makeBeing(x,y,makePlant(),true));}

  // Seed initial deer — scattered across map
  var dt0=ANIMAL_TIERS[0];
  for(var i=0;i<6;i++){
    var adna=makeDNA(CL.AN);adna.tier=0;adna.hp=dt0.hp;adna.maxHp=dt0.hp;adna.spd=dt0.spd;adna.hit=dt0.hit;adna.name=dt0.name;adna.rebirths=0;
    var anim=makeBeing(20+Math.random()*(W-40),20+Math.random()*(H-40),adna,false);
    anim.energy=60;orgs.push(anim);
  }

  // BUILD MIGRATION QUEUE
  migrationQueue=[];

  function queueGroup(atTick,cls,count,edgeX,edgeY,spread){
    for(var i=0;i<count;i++){
      var x=edgeX+(Math.random()-0.5)*spread;
      var y=edgeY+(Math.random()-0.5)*spread;
      x=clamp(x,3,W-3);y=clamp(y,3,H-3);
      var ci=Math.floor(y/CELL)*COLS+Math.floor(x/CELL);
      if(ci>=0&&ci<NCELLS&&walls[ci]){x=8;}
      migrationQueue.push({atTick:atTick+i*12,cl:cls,x:x,y:y});
    }
  }

  if(currentMap===4){
    // THREE KINGDOMS — seed left kingdom from left edge, right kingdom from right edge
    // Left kingdom
    queueGroup(20,  CL.P, 1, 8,   H*0.30, 20);
    queueGroup(40,  CL.W, 3, 8,   H*0.45, 25);
    queueGroup(80,  CL.M, 1, 8,   H*0.50, 20);
    queueGroup(100, CL.F, 8, 8,   H*0.50, 50);
    queueGroup(300, CL.W, 2, 8,   H*0.55, 20);
    queueGroup(360, CL.F, 5, 8,   H*0.60, 30);
    queueGroup(500, CL.P, 1, 8,   H*0.35, 15);
    // Right kingdom — enters from right edge
    queueGroup(20,  CL.P, 1, W-8, H*0.30, 20);
    queueGroup(40,  CL.W, 3, W-8, H*0.45, 25);
    queueGroup(80,  CL.M, 1, W-8, H*0.50, 20);
    queueGroup(100, CL.F, 8, W-8, H*0.50, 50);
    queueGroup(300, CL.W, 2, W-8, H*0.55, 20);
    queueGroup(360, CL.F, 5, W-8, H*0.60, 30);
    queueGroup(500, CL.P, 1, W-8, H*0.35, 15);
    // Bandits from south into middle
    for(var bi=0;bi<5;bi++)migrationQueue.push({atTick:700+bi*30,cl:CL.BN,x:W*0.45+Math.random()*W*0.10,y:H-8});
  }else{
    // Standard migration — left/south entry
    queueGroup(20,  CL.P, 2,  W*0.60, H-8, 20);
    queueGroup(40,  CL.W, 8,  W-8,   H*0.45, 20);
    queueGroup(80,  CL.M, 2,  W*0.50, H-8, 20);
    queueGroup(100, CL.F, 20, W*0.45, H-8, 40);
    queueGroup(300, CL.W, 6,  W-8, H*0.55, 20);
    queueGroup(360, CL.F, 16, W-8, H*0.60, 30);
    queueGroup(550, CL.P, 2,  W*0.60, H-8, 20);
    queueGroup(580, CL.F, 12, W*0.55, H-8, 40);
    queueGroup(650, CL.W, 6,  W-8, H*0.40, 25);
    var bx=W*0.75,by=H-8;
    for(var bi=0;bi<5;bi++)migrationQueue.push({atTick:700+bi*30,cl:CL.BN,x:bx+(Math.random()-0.5)*30,y:by+(Math.random()-0.5)*12});
  }

  // Sort queue by tick
  migrationQueue.sort(function(a,b){return a.atTick-b.atTick;});
} // end init

var banditIntensity=1;
document.getElementById('spR').addEventListener('input',function(e){speed=parseInt(e.target.value);document.getElementById('spV').textContent=speed+'x';});
document.getElementById('bnR').addEventListener('input',function(e){
  banditIntensity=parseInt(e.target.value);
  var labels=['off','trickle','low','medium','high','swarm'];
  document.getElementById('bnV').textContent=labels[banditIntensity];
});

// PURGE — kill every bandit instantly
document.getElementById('killBanditsBtn').addEventListener('click',function(){
  for(var i=0;i<orgs.length;i++){
    if(orgs[i].alive&&isBandit(orgs[i]))orgs[i].alive=false;
  }
});

// AUTO MODE — organic slow-cycle bandit pressure
// A "year" ~ 1800 ticks at speed 4.
// Seasons: quiet (55%), trickle (28%), stirring (12%), brief medium surge (5%)
// Spawn sizes capped at half normal so it never overwhelms testing
var autoBandits=false;
var autoSeason=0;
var nextAutoSeasonAt=0;

function rollAutoSeason(){
  var r=Math.random();
  var len;
  if(r<0.55)     {autoSeason=0;len=Math.floor(rnd(900,2800));}
  else if(r<0.83){autoSeason=1;len=Math.floor(rnd(400,1400));}
  else if(r<0.95){autoSeason=2;len=Math.floor(rnd(200,700));}
  else           {autoSeason=3;len=Math.floor(rnd(120,320));}
  nextAutoSeasonAt=tick+len;
}

// Each auto system captures the slider value on toggle-on as its PEAK.
// Oscillates between ~35% of peak (trough) and 100% (peak).
// Adjust slider → toggle off → toggle on to set new peak.

var banditPeak=1; // peak intensity level (0-5)
function stepAutoBandits(){
  if(!autoBandits)return;
  if(tick>=nextAutoSeasonAt)rollAutoSeason();
  // Map season to fraction of peak: quiet=0, trickle=0.35, stirring=0.65, surge=1.0
  var fracs=[0,0.35,0.65,1.0];
  var eff=Math.round(fracs[Math.min(autoSeason,3)]*banditPeak);
  banditIntensity=clamp(eff,0,5);
  document.getElementById('bnR').value=banditIntensity;
  var labels=['off','trickle','low','medium','high','swarm'];
  document.getElementById('bnV').textContent=(banditIntensity===0?'quiet ◎':labels[banditIntensity]+' ◎');
}
document.getElementById('autoBanditsBtn').addEventListener('click',function(){
  autoBandits=!autoBandits;
  var btn=document.getElementById('autoBanditsBtn');
  if(autoBandits){
    banditPeak=banditIntensity||1; // capture current slider as peak
    btn.textContent='auto: on';
    btn.style.background='#201808';btn.style.borderColor='#806020';btn.style.color='#d4a040';
    rollAutoSeason();
  }else{
    btn.textContent='auto: off';
    btn.style.background='#1a1008';btn.style.borderColor='#4a3010';btn.style.color='#a08040';
  }
});

// ================================================================
// MĀRA AUTO — nested planetary cycles, slider = peak
// ================================================================
var autoMara=false;
var maraPeak=1.0;
var maraPhaseG=Math.random()*Math.PI*2;
var maraPhaseM=Math.random()*Math.PI*2;
var maraPhaseS=Math.random()*Math.PI*2;
var maraGrandPeriod=36000*(0.85+Math.random()*0.30);
var maraMiddlePeriod=9000*(0.85+Math.random()*0.30);
var maraSmallPeriod=1800*(0.80+Math.random()*0.40);
var maraNextSpike=Math.floor(rnd(5000,12000));
var maraSpikeDuration=0;

function stepAutoMara(){
  if(!autoMara)return;
  maraPhaseG+=Math.PI*2/maraGrandPeriod;
  maraPhaseM+=Math.PI*2/maraMiddlePeriod;
  maraPhaseS+=Math.PI*2/maraSmallPeriod;
  // Three nested waves — base sits at 0.78, can barely dip below 0.60, regularly hits peak
  var wave=(0.78+Math.sin(maraPhaseG)*0.14
           +Math.sin(maraPhaseM)*0.07
           +Math.sin(maraPhaseS)*0.04
           +(Math.random()-0.5)*0.02);
  wave=clamp(wave,0,1);
  // Floor is 62% of peak — Māra is rarely quiet, usually above middle
  var target=maraPeak*(0.62+wave*0.38);
  // Rare spike — pushes briefly to full peak
  if(tick>=maraNextSpike&&maraSpikeDuration===0){
    maraSpikeDuration=Math.floor(rnd(300,800));
  }
  if(maraSpikeDuration>0){
    var arc=Math.sin(Math.PI*(1-maraSpikeDuration/600));
    target=clamp(target+arc*(maraPeak-target)*0.6,0,maraPeak);
    maraSpikeDuration--;
    if(maraSpikeDuration===0)maraNextSpike=tick+Math.floor(rnd(5000,14000));
  }
  maraIntensity=clamp(target,0,2);
  updateSlider('maraSlider',maraIntensity.toFixed(2));
  updateSliderText('maraSliderVal',maraIntensity.toFixed(2)+'×');
}
document.getElementById('autoMaraBtn').addEventListener('click',function(){
  autoMara=!autoMara;
  var btn=document.getElementById('autoMaraBtn');
  if(autoMara){
    maraPeak=maraIntensity||1.0; // capture current slider as peak
    btn.textContent='māra auto: on';
    btn.style.background='#280a40';btn.style.borderColor='#7030b0';btn.style.color='#c080f0';
  }else{
    btn.textContent='māra auto: off';
    btn.style.background='#1a0828';btn.style.borderColor='#4a1870';btn.style.color='#9060c0';
  }
});

// ================================================================
// REGAL PULL — chakkavartin-driven, always active
function stepAutoRegal(){
  var target;
  var ticksSinceDeath=tick-lastChakkavartinDeathTick;
  if(chakkavartinBeing&&chakkavartinBeing.alive){
    var reignAge=tick-chakkavartinTick;
    if(reignAge<800)target=0.25+clamp(reignAge/800,0,1)*0.55;
    else if(reignAge<4000)target=0.80+clamp((reignAge-800)/3200,0,1)*0.70;
    else target=1.50+clamp((reignAge-4000)/8000,0,1)*0.45;
    target*=(1+maraIntensity*0.18);
  } else if(ticksSinceDeath<2000){
    target=0.08+clamp(ticksSinceDeath/2000,0,1)*0.42;
  } else {
    target=0.50-clamp(banditCount/25,0,0.30);
  }
  regalIntensity+=(clamp(target,0,2.0)-regalIntensity)*0.0006;
  regalIntensity=clamp(regalIntensity,0,2.0);
  updateSlider('regalSlider',regalIntensity.toFixed(2));
  updateSliderText('regalSliderVal',regalIntensity.toFixed(1)+'×');
}

// TERRITORY MEMORY — population-health-driven, always active
function stepAutoMem(){
  var popDensity=clamp(cTotal/MAX_BEINGS,0,1);
  var instability=clamp(banditCount/20,0,0.5);
  var crisis=activeEv?0.15:0;
  var stability=clamp(popDensity*0.7-instability-crisis,0,1);
  var target=0.990+stability*0.0098;
  PRESENCE_DECAY+=(target-PRESENCE_DECAY)*0.0004;
  PRESENCE_DECAY=clamp(PRESENCE_DECAY,0.990,0.9999);
  updateSlider('decaySlider',PRESENCE_DECAY.toFixed(4));
  updateSliderText('decaySliderVal',PRESENCE_DECAY.toFixed(4));
}

// HOME SENSE — now a heritable gene; no global dynamic needed

sammaBtn.addEventListener('click',function(){

  if(!sammaOn){

    sammaExists=false;
  }
});

generateMap(); // every open is a fresh world
var frame=0;
var skipping=false;
var skipRemaining=0;
var skipTotal=0;
function updateSlider(id,val){if(skipping)return;var el=document.getElementById(id);if(el)el.value=val;}
function updateSliderText(id,txt){if(skipping)return;var el=document.getElementById(id);if(el)el.textContent=txt;}
var SKIP_CHUNK=500; // steps per chunk — fast but yields to browser

function doSkipChunk(){
  if(!skipping)return;
  var chunk=Math.min(SKIP_CHUNK,skipRemaining);
  for(var i=0;i<chunk;i++){
    stepAutoBandits();stepAutoMara();stepAutoRegal();stepAutoMem();stepAutoSense();step();
  }
  skipRemaining-=chunk;
  var done=skipTotal-skipRemaining;
  var pct=Math.round(done/skipTotal*100);
  var prog=document.getElementById('skipProgress');
  if(prog)prog.textContent='tick '+tick+' — '+pct+'% ('+Math.round(done/1000)+'k / '+Math.round(skipTotal/1000)+'k)';
  if(skipRemaining>0){
    setTimeout(doSkipChunk,0);
  }else{
    skipping=false;
    document.getElementById('skipOverlay').style.display='none';
    wallDirty=true;
    drawWorld();drawGraph();updateUI();
    paused=false;
    var pb2=document.getElementById('pauseBtn');if(pb2)pb2.textContent='pause';
  }
}

document.getElementById('skipBtn').addEventListener('click',function(){
  var ov=document.getElementById('skipOverlay');
  ov.style.display='flex';
  paused=true;
});

document.querySelectorAll('.skipAmt').forEach(function(btn){
  btn.addEventListener('click',function(){
    var n=parseInt(this.getAttribute('data-n'));
    skipping=true;
    skipRemaining=n;
    skipTotal=n;
    document.getElementById('skipProgress').textContent='starting…';
    paused=true; // keep paused during skip — loop won't call step()
    setTimeout(doSkipChunk,20);
  });
});

document.getElementById('skipCancel').addEventListener('click',function(){
  skipping=false;
  skipRemaining=0;
  document.getElementById('skipOverlay').style.display='none';
  drawWorld();drawGraph();updateUI();
});

function loop(){
  if(!paused&&!skipping){for(var i=0;i<speed;i++){stepAutoBandits();stepAutoMara();stepAutoRegal();stepAutoMem();stepAutoSense();step();}drawWorld();drawGraph();if(frame++%8===0)updateUI();}
  requestAnimationFrame(loop);
}
loop();
</script>

<div id="storyPanel">
  <button id="storyClose" onclick="document.getElementById('storyPanel').style.display='none';">✕</button>
  <h2>The Chronicle</h2>
  <label>How long did that feel?</label>
  <textarea id="feltDuration" rows="2" placeholder="an afternoon · three generations · the rise and fall of a dynasty · geological time"></textarea>
  <label>What would you like to focus on? (optional)</label>
  <textarea id="focusArea" rows="3" placeholder="The animals in the NE. The sramana who gathered in the corner. The warrior who kept appearing at the altar. The bandit raids on the farms."></textarea>
  <button onclick="readStory()">Tell me the story</button>
  <div id="storyOutput"></div>
</div>

<script>
async function readStory(){
  var felt=document.getElementById('feltDuration').value||'an unknown span of time';
  var focus=document.getElementById('focusArea').value;
  var out=document.getElementById('storyOutput');
  out.textContent='Reading the records…';

  // COMPRESS — summarize counts, keep only most dramatic individual events
  var counts={sramana_born:0,awakening:0,animal_slain:0,hybrid_born:0,bloom:0,water_of_life:0,samma_appears:0};
  var highlights=[]; // only the rarest / most dramatic
  ledger.forEach(function(e){
    counts[e.type]=(counts[e.type]||0)+1;
    // Keep only high-impact individual events
    if(e.type==='samma_appears'||e.type==='hybrid_born'||e.type==='bloom')highlights.push(e);
    if(e.type==='animal_slain'&&e.data.tier>=2)highlights.push(e); // only lion/bear
    if(e.type==='awakening'&&highlights.length<6)highlights.push(e);
    if(e.type==='sramana_born'&&e.data.rebirths>15)highlights.push(e); // only ancient souls
  });
  // Keep 8 highlights max
  highlights=highlights.slice(-8);

  var eventSummary='Event counts: '
    +counts.sramana_born+' renunciants emerged, '
    +counts.water_of_life+' drank from the Water of Life, '
    +(counts.bloom||0)+' blooms occurred, '
    +counts.animal_slain+' animals slain, '
    +(counts.hybrid_born||0)+' human-animal unions, '
    +(counts.samma_appears||0)+' Sammā Sambuddha appearances.\n\n'
    +'Notable moments:\n'
    +highlights.map(function(e){
      var d=e.data;
      if(e.type==='samma_appears')return '- The Sammā Sambuddha '+d.name+' appeared at tick '+e.tick;
      if(e.type==='awakening')return '- '+d.name+' awakened ('+d.rebirths+' rebirths) near the Sammā';
      if(e.type==='animal_slain')return '- A '+d.name+' (tier '+d.tier+') was slain by '+d.hunters+' hunters';
      if(e.type==='hybrid_born')return '- A child of two natures was born from '+d.parentName+' and the '+d.animalName;
      if(e.type==='bloom')return '- '+d.drinker+' drank deep and the land bloomed';
      if(e.type==='sramana_born')return '- '+d.name+' renounced after '+Math.round(d.rebirths)+' rebirths';
      return '- '+e.type+' at tick '+e.tick;
    }).join('\n');

  // Population arc — just start and end and peak
  var popArc='';
  if(popHistory.length>2){
    var first=popHistory[0],last=popHistory[popHistory.length-1];
    var peak={w:0,sr:0,bn:0};
    popHistory.forEach(function(s){peak.w=Math.max(peak.w,s.w);peak.sr=Math.max(peak.sr,s.sr);peak.bn=Math.max(peak.bn,s.bn);});
    popArc='Population: began '+JSON.stringify(first)+', ended '+JSON.stringify(last)+'. Peak warriors: '+peak.w+', peak sramana: '+peak.sr+', peak bandits: '+peak.bn+'.';
  }

  var prompt='You are a storyteller reading annals of a small civilization. The observer experienced this as: "'+felt+'". Write at that scale — afternoon means personal drama, centuries means history, geological time means myth.\n\n'
    +(focus?'Focus particularly on: '+focus+'\n\n':'')
    +popArc+'\n\n'+eventSummary+'\n\n'
    +'Find the human shape. Name the arcs and turning points. Write in the register of the felt duration. No simulation language — only story. Keep it to 3-4 paragraphs.';

  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        messages:[{role:'user',content:prompt}]
      })
    });
    var data=await resp.json();
    var text=data.content&&data.content[0]&&data.content[0].text;
    out.textContent=text||JSON.stringify(data);
  }catch(e){
    out.textContent='Error: '+e.message;
  }
}
</script>
